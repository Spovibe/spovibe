<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Créer un compte · Spovibe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@900&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="assets/favicon-spovibe.svg">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div class="bg-ambient"></div>
  <div id="nav"></div>

  <main class="auth-wrap">
    <div class="auth-card card">
      <h2 style="font-size:1.6rem;margin-bottom:6px;">Créer votre compte</h2>
      <p class="muted" style="margin-bottom:24px;font-size:0.95rem;">Rejoignez Spovibe et lancez votre évaluation.</p>

      <div class="alert error" id="alert"></div>

      <form id="form">
        <div class="field">
          <label for="name">Nom complet</label>
          <input class="input" type="text" id="name" placeholder="Alex Dupont" autocomplete="name" required>
        </div>
        <div class="field">
          <label for="email">E-mail</label>
          <input class="input" type="email" id="email" placeholder="vous@exemple.com" autocomplete="email" required>
        </div>
        <div class="field">
          <label for="password">Mot de passe</label>
          <input class="input" type="password" id="password" placeholder="6 caractères minimum" autocomplete="new-password" required>
        </div>
        <button class="btn btn-primary btn-block btn-lg" type="submit">Créer mon compte</button>
      </form>

      <p class="form-note">Déjà membre ? <a href="login.html">Se connecter</a></p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/sb-config.js"></script>
  <script src="assets/sb.js"></script>
  <script src="assets/app.js"></script>
  <script src="assets/email.js"></script>
  <script>
    document.getElementById("nav").innerHTML = SF.renderNav();
    const alert = document.getElementById("alert");
    const submitBtn = document.querySelector("#form button[type=submit]");
    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      alert.classList.remove("show");
      const original = submitBtn.textContent;
      submitBtn.disabled = true; submitBtn.textContent = "Création…";
      try {
        const res = await SF.signup(
          document.getElementById("name").value,
          document.getElementById("email").value,
          document.getElementById("password").value
        );
        if (res.error) { alert.textContent = res.error; alert.classList.add("show"); return; }
        // Envoie un e-mail de bienvenue brandé (en plus de l'e-mail de confirmation Supabase par défaut)
        try {
          if (window.SpovibeEmail) {
            SpovibeEmail.send("welcome", document.getElementById("email").value.trim().toLowerCase(), { name: document.getElementById("name").value.trim() });
          }
        } catch (e) {}
        if (res.needsConfirmation) {
          alert.classList.remove("error"); alert.classList.add("ok","show");
          alert.textContent = "Vérifiez votre boîte mail pour confirmer votre compte.";
          return;
        }
        location.href = "challenges.html";
      } finally {
        submitBtn.disabled = false; submitBtn.textContent = original;
      }
    });
  </script>
</body>
</html>
