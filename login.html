<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion · Spovibe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@900&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="assets/favicon-spovibe.svg">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div class="bg-ambient"></div>
  <div id="nav"></div>

  <main class="auth-wrap">
    <div class="auth-card card">
      <h2 style="font-size:1.6rem;margin-bottom:6px;">Connexion</h2>
      <p class="muted" style="margin-bottom:24px;font-size:0.95rem;">Accédez à votre tableau de bord parieur.</p>

      <div class="alert error" id="alert"></div>

      <form id="form">
        <div class="field">
          <label for="email">E-mail</label>
          <input class="input" type="email" id="email" placeholder="vous@exemple.com" autocomplete="email" required>
        </div>
        <div class="field">
          <label for="password">Mot de passe</label>
          <input class="input" type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button class="btn btn-primary btn-block btn-lg" type="submit">Se connecter</button>
      </form>

      <p class="form-note">Pas encore de compte ? <a href="signup.html">Créer un compte</a></p>
    </div>
  </main>

  <script src="assets/app.js"></script>
  <script>
    document.getElementById("nav").innerHTML = SF.renderNav();
    const alert = document.getElementById("alert");
    document.getElementById("form").addEventListener("submit", (e) => {
      e.preventDefault();
      const res = SF.login(document.getElementById("email").value, document.getElementById("password").value);
      if (res.error) { alert.textContent = res.error; alert.classList.add("show"); return; }
      const acc = SF.getAccount();
      location.href = acc ? "espace.html" : "challenges.html";
    });
  </script>
</body>
</html>
