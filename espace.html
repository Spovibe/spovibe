<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Espace membre · Spovibe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@900&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="assets/favicon-spovibe.svg">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div class="bg-ambient"></div>
  <div id="nav"></div>

  <main>
    <div class="bo">
      <aside class="bo-side">
        <div class="bo-who" id="boWho"></div>
        <div class="bo-search">
          <span class="si"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg></span>
          <input id="boSearchInput" type="search" placeholder="Rechercher…" autocomplete="off">
          <kbd>⌘K</kbd>
        </div>
        <nav class="bo-nav" id="boNav"></nav>
        <div class="bo-up">
          <h4>Booster ton compte</h4>
          <p>Lance un palier supérieur pour piloter jusqu'à 100 000 €.</p>
          <a class="btn btn-primary btn-sm" href="challenges.html">Passer Pro</a>
        </div>
      </aside>
      <section class="bo-main"><div id="view"></div></section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/sb-config.js"></script>
  <script src="assets/sb.js"></script>
  <script src="assets/app.js"></script>
  <script src="assets/polymarket.js"></script>
  <script src="assets/email.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
  <script src="assets/certificate.js" defer></script>
  <script>
    document.getElementById("nav").innerHTML = SF.renderNav();
    if (!SF.requireAuth()) { /* redirige vers login */ }

    /* ---------- Icônes ---------- */
    const I = {
      grid: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>',
      target: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/></svg>',
      trophy: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 21h8M12 17v4M6 4h12v4a6 6 0 0 1-12 0V4zM6 6H4v1a3 3 0 0 0 3 3M18 6h2v1a3 3 0 0 1-3 3"/></svg>',
      gift: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="8" width="18" height="4" rx="1"/><path d="M5 12v9h14v-9M12 8v13M12 8S10 3 7 4s1 4 5 4M12 8s2-5 5-4-1 4-5 4"/></svg>',
      users: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0 .01M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
      wallet: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18M16 14h2"/></svg>',
      gear: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.5-2.3 1a7 7 0 0 0-1.7-1l-.4-2.5h-4l-.4 2.5a7 7 0 0 0-1.7 1l-2.3-1-2 3.5 2 1.5a7 7 0 0 0 0 2l-2 1.5 2 3.5 2.3-1a7 7 0 0 0 1.7 1l.4 2.5h4l.4-2.5a7 7 0 0 0 1.7-1l2.3 1 2-3.5-2-1.5a7 7 0 0 0 .1-1z"/></svg>',
      ball: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7l4.7 3.4-1.8 5.5h-5.8l-1.8-5.5z"/></svg>',
      chart: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>',
      cert: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><circle cx="12" cy="9" r="6"/><path d="M9 14l-2 7 5-3 5 3-2-7"/></svg>',
    };
    /* Icônes inline « inline-with-text » pour remplacer les emojis dans les chips/labels */
    const ICN_SPORT  = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round" style="vertical-align:-2px;flex-shrink:0;"><circle cx="12" cy="12" r="9"/><path d="M12 7l4.7 3.4-1.8 5.5h-5.8l-1.8-5.5z"/></svg>';
    const ICN_CHART  = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;flex-shrink:0;"><path d="M3 17l6-6 4 4 8-9"/><path d="M17 6h4v4"/></svg>';
    const ICN_TROPHY = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round" style="vertical-align:-2px;flex-shrink:0;"><path d="M8 21h8M12 17v4M6 4h12v4a6 6 0 0 1-12 0V4zM6 6H4v1a3 3 0 0 0 3 3M18 6h2v1a3 3 0 0 1-3 3"/></svg>';
    const ICN_USERS  = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round" style="vertical-align:-2px;flex-shrink:0;"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0 .01M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>';
    const SECTIONS = [
      ["overview", "Vue d'ensemble", I.grid],
      ["challenges", "Mes challenges", I.target],
      ["betting", "Paris sportifs", I.ball],
      ["predictions", "Marchés prédictifs", I.chart],
      ["arena", "Arena", I.trophy],
      ["__sect", "FEATURES"],
      ["certificates", "Mes certificats", I.cert],
      ["rewards", "Récompenses", I.gift],
      ["community", "Communauté", I.users],
      ["profile", "Profil & paiements", I.wallet],
      ["settings", "Paramètres", I.gear],
    ];
    const TITLES = {
      overview: ["Vue d'ensemble", "Tout ton espace Spovibe en un coup d'œil"],
      challenges: ["Mes challenges", "Suis ton évaluation et ton compte financé"],
      betting: ["Paris sportifs", "Place tes paris avec la bankroll de ton challenge"],
      predictions: ["Marchés prédictifs", "Achète des positions YES/NO sur les grands marchés Polymarket"],
      arena: ["Arena", "Ton classement de poule et ta division"],
      certificates: ["Mes certificats", "Téléchargez vos preuves de réussite et de paiement"],
      rewards: ["Récompenses & codes", "Crédits, codes promo et parrainage"],
      community: ["Communauté", "Discussion réservée aux créateurs et à leur communauté"],
      profile: ["Profil & paiements", "Tes informations et ton historique"],
      settings: ["Paramètres", "Sécurité et préférences"],
    };

    /* ---------- Vue d'ensemble ---------- */
    // Jauge circulaire SVG (gradient orange)
    function ring(pct, val, label) {
      pct = Math.max(0, Math.min(1, pct || 0));
      const r = 50, c = 2 * Math.PI * r, off = c * (1 - pct);
      return `<div class="ring-wrap"><svg class="ring" viewBox="0 0 120 120" aria-hidden="true">
        <defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="rgba(255,255,255,0.78)"/></linearGradient></defs>
        <circle cx="60" cy="60" r="${r}" stroke="rgba(255,255,255,0.22)" stroke-width="10" fill="none"/>
        <circle cx="60" cy="60" r="${r}" stroke="url(#rg)" stroke-width="10" fill="none" stroke-linecap="round"
          stroke-dasharray="${c.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}" transform="rotate(-90 60 60)"/>
      </svg><div class="ring-c"><div class="v">${val}</div><div class="l">${label}</div></div></div>`;
    }

    function viewOverview() {
      const u = SF.currentUser();
      const sAcc = SF.sportsAccount(), pAcc = SF.predictionsAccount();
      const allAccs = SF.activeAccounts();
      const combo = SF.combinedStats();
      const r = SF.getRewards(), c = SF.myCommunity(), p = SF.poule();
      // Compte « principal » utilisé pour les sections qui doivent en pointer un (heuristique : celui le plus avancé)
      const acc = sAcc || pAcc;
      const s = acc ? SF.stats(acc) : null;
      const hour = new Date().getHours();
      const greet = hour < 6 ? "Bonne nuit" : hour < 12 ? "Bonjour" : hour < 18 ? "Bonsoir" : "Bonsoir";
      const firstName = (u.name || "").split(" ")[0] || u.name;

      // Hero card — version multi-vertical
      let hero;
      if (allAccs.length) {
        const headlinePctG = combo.capital ? (combo.profit / (combo.capital * 0.35)) : 0;
        const profitTxt = (combo.profit >= 0 ? "+" : "") + SF.fmt2(combo.profit);
        const vChips = allAccs.map(a => {
          const v = a.vertical || a.tier.vertical || "sports";
          return `<span style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.25);border-radius:99px;font-size:0.74rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;">${v === "predictions" ? ICN_CHART : ICN_SPORT} ${vertLabel(v)} · ${a.tier.name}</span>`;
        }).join("");
        hero = `<div class="hero-bo">
          <div style="flex:1;min-width:0;">
            <div class="h-tag">${allAccs.length === 2 ? "Multi-edge actif" : "Ton challenge"}</div>
            <h2>Profit cumulé <span style="color:#fff;">+35 %</span> visé</h2>
            <div class="h-amt ${combo.profit >= 0 ? 'pos' : 'neg'}">${profitTxt}</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;">${vChips}</div>
            <div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap;">
              <button class="btn btn-primary btn-sm" onclick="go('challenges')">Voir mes challenges</button>
              ${sAcc ? `<button class="btn btn-ghost btn-sm" onclick="go('betting')">Paris sportifs</button>` : ''}
              ${pAcc ? `<button class="btn btn-ghost btn-sm" onclick="go('predictions')">Prédictions</button>` : ''}
            </div>
          </div>
          <div class="h-side">${ring(headlinePctG, (combo.profitPct >= 0 ? "+" : "") + combo.profitPct + "%", "Vers +35 %")}</div>
        </div>`;
      } else {
        hero = `<div class="hero-bo">
          <div style="flex:1;">
            <div class="h-tag">Bienvenue, ${SF.escapeHtml(firstName)}</div>
            <h2>Décroche un <span style="color:#fff;">capital pro</span></h2>
            <p style="color:rgba(255,255,255,0.85);margin:8px 0 14px;">Choisis ta vertical — Sports ou Prédictions — et lance ton évaluation pour viser un compte financé jusqu'à 100 000 €.</p>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              <a class="btn btn-primary btn-sm" href="challenges.html?v=sports">${ICN_SPORT} Challenge Sports</a>
              <a class="btn btn-ghost btn-sm" href="challenges.html?v=predictions">${ICN_CHART} Challenge Prédictions</a>
            </div>
          </div>
          <div class="h-side">${ring(0, "0%", "Démarre")}</div>
        </div>`;
      }

      // Quick action cards
      const nPend = acc && acc.pending ? acc.pending.length : 0;
      const qCards = `<div class="q-grid">
        <div class="q-card" onclick="go('betting')">
          <div class="q-ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7l4.7 3.4-1.8 5.5h-5.8l-1.8-5.5z"/></svg></div>
          <h4>Paris sportifs</h4>
          <p>${nPend ? nPend + " pari(s) en cours" : "Place ton prochain prono"}</p>
        </div>
        <div class="q-card" onclick="go('arena')">
          <div class="q-ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 21h8M12 17v4M6 4h12v4a6 6 0 0 1-12 0V4zM6 6H4v1a3 3 0 0 0 3 3M18 6h2v1a3 3 0 0 1-3 3"/></svg></div>
          <h4>Arena · ${p.divName}</h4>
          <p>Rang ${p.me.rank}/${p.total}${p.me.rank <= p.promoMax ? " · zone de montée" : p.me.rank >= p.relegMin ? " · zone de descente" : ""}</p>
        </div>
        <div class="q-card" onclick="go('rewards')">
          <div class="q-ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="8" width="18" height="4" rx="1"/><path d="M5 12v9h14v-9M12 8v13"/></svg></div>
          <h4>Récompenses</h4>
          <p>${r.credits} € de crédits · ${r.codes.length} code(s)</p>
        </div>
      </div>`;

      // Activité récente
      const activity = acc && acc.bets.length ? acc.bets.slice(0, 5) : [];
      const actHtml = activity.length ? `<div class="card" style="margin-top:18px;">
        <h3 style="font-size:1.05rem;margin-bottom:6px;">Activité récente</h3>
        ${activity.map(b => `<div class="act-row"><div class="ic ${b.result === 'win' ? 'win' : 'lose'}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">${b.result === 'win' ? '<path d="M20 6L9 17l-5-5"/>' : '<path d="M18 6L6 18M6 6l12 12"/>'}</svg></div><div class="lbl"><b>${SF.escapeHtml(b.event)}</b><span>${SF.fmtDate(b.date)} · cote ${b.odds.toFixed(2)}</span></div><div class="amt ${b.pnl >= 0 ? 'pos' : 'neg'}">${b.pnl >= 0 ? '+' : ''}${SF.fmt2(b.pnl)}</div></div>`).join("")}
      </div>` : `<div class="card" style="margin-top:18px;"><h3 style="font-size:1.05rem;margin-bottom:6px;">Activité récente</h3><p class="muted" style="font-size:0.9rem;">Aucun pari encore. Lance-toi depuis « Paris sportifs ».</p></div>`;

      // Rail droite : ta progression + communauté
      const headlinePct = s ? (s.profitPct / acc.tier.target) : 0;
      const headlineVal = s ? (s.profitPct >= 0 ? "+" : "") + s.profitPct + "%" : "—";
      const statRail = `<div class="card" style="padding:22px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><h3 style="font-size:1.05rem;">Ta progression</h3><span class="muted" style="font-size:0.78rem;">Saison</span></div>
        <div style="display:grid;place-items:center;margin:6px 0 14px;">${ring(headlinePct, headlineVal, "Objectif")}</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center;">
          <div><div style="font-weight:900;font-size:1.05rem;color:var(--orange)">${s ? s.bets : 0}</div><div class="muted" style="font-size:0.74rem;">Paris</div></div>
          <div><div style="font-weight:900;font-size:1.05rem;">${s ? s.winRate : 0}%</div><div class="muted" style="font-size:0.74rem;">Win rate</div></div>
          <div><div style="font-weight:900;font-size:1.05rem;" class="${s && s.roi >= 0 ? 'pos' : s ? 'neg' : ''}">${s ? (s.roi >= 0 ? '+' : '') + s.roi + '%' : '—'}</div><div class="muted" style="font-size:0.74rem;">ROI</div></div>
        </div>
      </div>`;

      const commRail = (() => {
        if (!c) return `<div class="card" style="padding:22px;margin-top:14px;">
            <h3 style="font-size:1.05rem;margin-bottom:6px;">Communauté</h3>
            <p class="muted" style="font-size:0.86rem;margin-bottom:14px;">Rejoins ou crée une communauté de créateur pour discuter et débloquer des récompenses.</p>
            <button class="btn btn-ghost btn-block btn-sm" onclick="go('community')">Découvrir</button>
          </div>`;
        const all = [c.creator, ...c.members];
        const shown = all.slice(0, 5);
        const more = all.length - shown.length;
        const palette = ['#FF7A3F', '#A04AFF', '#FF5A6E', '#FFB070', '#3FE08A'];
        const avs = `<div class="av-stack">${shown.map((e, i) => `<div class="av-mini" style="background:${palette[i % palette.length]}">${(e[0] || '?').toUpperCase()}</div>`).join("")}${more > 0 ? `<div class="av-mini more">+${more}</div>` : ''}</div>`;
        return `<div class="card" style="padding:22px;margin-top:14px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;"><h3 style="font-size:1.05rem;">Communauté</h3><span class="muted" style="font-size:0.78rem;">${all.length} membre${all.length > 1 ? 's' : ''}</span></div>
          <div style="font-weight:800;font-size:1.1rem;margin-bottom:4px;">${SF.escapeHtml(c.name)}</div>
          ${avs}
          <p class="muted" style="font-size:0.86rem;margin-bottom:14px;">${c.messages.length} message(s) dans le fil</p>
          <button class="btn btn-ghost btn-block btn-sm" onclick="go('community')">Ouvrir</button>
        </div>`;
      })();

      // ====== Layout style Fintrixity (multi-vertical) ======
      const totalBalance = allAccs.reduce((sum, a) => sum + a.balance, 0);
      const totalCapital = allAccs.reduce((sum, a) => sum + a.capital, 0);
      const totalProfitPctTxt = combo ? (combo.profitPct >= 0 ? '+' : '') + combo.profitPct + '%' : '';
      const featuredCard = `<div class="sc featured">
        <div class="sc-row">
          <div class="sc-ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18M16 14h2"/></svg></div>
          <div class="sc-tt"><div class="sc-ttl">Solde global</div><div class="sc-sub">${allAccs.length === 2 ? 'Sports + Prédictions' : (allAccs.length === 1 ? vertLabel(allAccs[0].vertical) : 'Aucun challenge')}</div></div>
          <div class="sc-more">⋯</div>
        </div>
        <div class="sc-amt">${allAccs.length ? SF.fmt2(totalBalance) : '0,00 €'}${combo ? ` <small>${totalProfitPctTxt}</small>` : ''}</div>
        <div class="sc-link" onclick="go('challenges')"><span>Voir le détail</span><span>→</span></div>
      </div>`;
      const savingsCard = `<div class="sc">
        <div class="sc-row">
          <div class="sc-ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="8" width="18" height="4" rx="1"/><path d="M5 12v9h14v-9M12 8v13"/></svg></div>
          <div class="sc-tt"><div class="sc-ttl">Crédits Spovibe</div><div class="sc-sub">Bonus & parrainage</div></div>
          <div class="sc-more">⋯</div>
        </div>
        <div class="sc-amt">${r.credits} € <small>${r.codes.length} code${r.codes.length > 1 ? 's' : ''}</small></div>
        <div class="sc-link" onclick="go('rewards')"><span>Voir mes codes</span><span>→</span></div>
      </div>`;
      const capitalCard = `<div class="sc">
        <div class="sc-row">
          <div class="sc-ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 15l4-4 3 3 5-6"/></svg></div>
          <div class="sc-tt"><div class="sc-ttl">Capital cumulé</div><div class="sc-sub">${allAccs.length ? allAccs.map(a => a.tier.name + ' ' + vertLabel(a.vertical)).join(' + ') : 'Aucun palier actif'}</div></div>
          <div class="sc-more">⋯</div>
        </div>
        <div class="sc-amt">${allAccs.length ? SF.fmt(totalCapital) : '—'}</div>
        <div class="sc-link" onclick="${allAccs.length ? "go('challenges')" : "location.href='challenges.html'"}"><span>${allAccs.length ? 'Voir mes challenges' : 'Choisir un palier'}</span><span>→</span></div>
      </div>`;

      // Mini-cartes wallet : un slot par vertical (toujours visible — actif ou prompt d'activation)
      function vertWm(v) {
        const a = v === "sports" ? sAcc : pAcc;
        const label = vertLabel(v);
        const status = !a ? 'Inactif' : (a.status === 'funded' ? 'Financé' : a.status === 'passed' ? 'Réussi' : a.status === 'failed' ? 'Échoué' : 'Actif');
        return `<div class="wm">
          <div class="wm-h"><div class="wm-n">${v === "predictions" ? ICN_CHART : ICN_SPORT} ${label}</div><div class="wm-d">⋯</div></div>
          <div class="wm-amt">${a ? SF.fmt(a.capital) : '—'}</div>
          <div class="wm-lim">${a ? a.tier.name + ' · +' + a.tier.target + '%' : 'Aucun challenge'}</div>
          <div class="wm-s ${a ? '' : 'off'}">${status}</div>
        </div>`;
      }
      const wmCards = `<div class="wallet-mini">
        ${vertWm("sports")}
        ${vertWm("predictions")}
        <div class="wm"><div class="wm-h"><div class="wm-n">${ICN_TROPHY} Arena</div><div class="wm-d">⋯</div></div><div class="wm-amt">${p.divName}</div><div class="wm-lim">Rang ${p.me.rank}/${p.total}</div><div class="wm-s">Active</div></div>
        <div class="wm"><div class="wm-h"><div class="wm-n">${ICN_USERS} Communauté</div><div class="wm-d">⋯</div></div><div class="wm-amt">${c ? SF.escapeHtml(c.name) : 'Solo'}</div><div class="wm-lim">${c ? (c.members.length + 1) + ' membres' : 'Aucune communauté'}</div><div class="wm-s ${c ? '' : 'off'}">${c ? 'Active' : 'Inactive'}</div></div>
      </div>`;
      const walletCard = `<div class="card">

          <button class="btn btn-primary btn-sm" onclick="location.href='challenges.html'">+ Ajouter</button>

      const months = ['Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Juin', 'Juil'];
      const heights = [42, 35, 95, 50, 38, 58, 30];
      const hiIndex = Math.min(new Date().getMonth(), 6);
      const bars = months.map((m, i) => `<div class="b-col"><div class="bar ${i === hiIndex ? 'hi' : ''}" style="height:${heights[i]}%"></div><div class="x">${m}</div></div>`).join("");
      const totalCf = (combo ? Math.abs(combo.profit) * 12 + 50000 : 540323);
      const chartCard = `<div class="card" style="padding:22px;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div><div class="muted" style="font-size:0.85rem;">Profit cumulé</div><div class="cf-amt">${SF.fmt2(totalCf)}</div></div>
          <div class="cf-toggle"><button>Mensuel</button><button class="active">Annuel</button></div>
        </div>
        <div class="bars">
          <div class="ys"><span>100k</span><span>75k</span><span>50k</span><span>25k</span><span>0</span></div>
          ${bars}
        </div>
      </div>`;

      // Activité agrégée des deux verticales
      const allBets = allAccs.flatMap(a => (a.bets || []).map(b => ({ ...b, _v: a.vertical || a.tier.vertical || "sports" })));
      allBets.sort((a, b) => b.date - a.date);
      const recent = allBets.slice(0, 6);
      const actTable = `<div class="card" style="padding:18px 22px;">
        <div class="act-h">
          <h3>Activité récente</h3>
          <div class="right"><button class="pill-sel ghost">Rechercher</button><button class="pill-sel ghost">Filtre</button></div>
        </div>
        ${recent.length ? `<div style="overflow-x:auto;"><table class="history" style="min-width:620px;"><thead><tr><th>Activité</th><th>Marché</th><th>Date</th><th>Cote</th><th>Mise</th><th>P&amp;L</th><th>Statut</th></tr></thead><tbody>
          ${recent.map(b => `<tr><td><b>${SF.escapeHtml(b.event)}</b></td><td class="muted">${b._v === "predictions" ? ICN_CHART + " Prédictions" : ICN_SPORT + " Sports"}</td><td class="muted">${SF.fmtDate(b.date)}</td><td>${b.odds.toFixed(2)}</td><td>${SF.fmt2(b.stake)}</td><td class="${b.pnl >= 0 ? 'pos' : 'neg'}">${b.pnl >= 0 ? '+' : ''}${SF.fmt2(b.pnl)}</td><td><span style="display:inline-flex;align-items:center;gap:6px;font-size:0.84rem;color:${b.result === 'win' ? 'var(--green)' : 'var(--red)'};"><span style="width:7px;height:7px;border-radius:50%;background:currentColor;"></span>${b.result === 'win' ? 'Gagné' : 'Perdu'}</span></td></tr>`).join("")}

      return `<div class="dash-h">

    }

    /* ---------- Mes challenges (multi-vertical) ---------- */
    function vertLabel(v) { return v === "predictions" ? "Prédictions" : "Sports"; }
    function vertGoTo(v) { return v === "predictions" ? "predictions" : "betting"; }
    function vertUnit(t) { return (t.unitLabel || "paris"); }

    // Stats supplémentaires non couvertes par SF.stats (mise moy, cote moy, max stake, best/worst, streak)
    function extendedStats(acc) {
      const bets = acc.bets || [];
      const n = bets.length;
      if (!n) return { avgStake: 0, avgOdds: 0, maxStake: 0, bestPnl: 0, worstPnl: 0, maxStakePctTaken: 0, currentStreak: { type: "", count: 0 }, dailyPnl: {} };
      const avgStake = bets.reduce((s, b) => s + b.stake, 0) / n;
      const avgOdds  = bets.reduce((s, b) => s + b.odds, 0) / n;
      const maxStake = bets.reduce((m, b) => Math.max(m, b.stake), 0);
      const bestPnl  = bets.reduce((m, b) => Math.max(m, b.pnl), 0);
      const worstPnl = bets.reduce((m, b) => Math.min(m, b.pnl), 0);
      const maxStakePctTaken = (maxStake / acc.capital) * 100;
      // bets sont rangés du plus récent au plus ancien (unshift)
      const head = bets[0];
      let streakCount = 0;
      for (const b of bets) { if (b.result === head.result) streakCount++; else break; }
      const dailyPnl = {};
      bets.forEach(b => { dailyPnl[b.day] = (dailyPnl[b.day] || 0) + b.pnl; });
      return { avgStake, avgOdds, maxStake, bestPnl, worstPnl, maxStakePctTaken,
        currentStreak: { type: head.result, count: streakCount }, dailyPnl };
    }
    // SVG icônes condition (validée vs en cours)
    const ICN_CHECK = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;"><path d="M20 6L9 17l-5-5"/></svg>';
    const ICN_HOURGLASS = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;"><path d="M5 22h14M5 2h14M17 22v-4.5a5 5 0 0 0-3-4.5 5 5 0 0 0 3-4.5V2M7 22v-4.5a5 5 0 0 1 3-4.5 5 5 0 0 1-3-4.5V2"/></svg>';
    function cMark(ok) { return ok ? `<span class="pos" style="display:inline-flex;align-items:center;gap:5px;">${ICN_CHECK}Validé</span>` : `<span class="muted" style="display:inline-flex;align-items:center;gap:5px;">${ICN_HOURGLASS}En cours</span>`; }
    function dateShort(ts) { return new Date(ts).toLocaleDateString("fr-FR", { day: "numeric", month: "short", year: "numeric" }); }

    function renderChallengeCard(acc) {
      const s = SF.stats(acc), t = acc.tier, pos = s.profit >= 0;

      const v = acc.vertical || t.vertical || "sports";

      const unit = vertUnit(t);
      let banner = "";
      if (acc.status === "passed") banner = `<div class="banner win"><strong>Évaluation ${vertLabel(v)} réussie !</strong>&nbsp; Objectif +${t.target}% atteint. Active ton compte financé.</div>`;
      else if (acc.status === "failed") banner = `<div class="banner lose"><strong>Challenge ${vertLabel(v)} terminé.</strong>&nbsp; ${SF.escapeHtml(acc.failReason || "")}</div>`;
      else if (acc.phase === "funded") banner = `<div class="banner win"><strong>Compte ${vertLabel(v)} financé actif.</strong>&nbsp; Partage ${t.split}% en ta faveur.</div>`;
      // Bouton certificat (visible dès que l'évaluation est validée ou le compte financé)
      const showCert = acc.status === "passed" || acc.phase === "funded";
      const certBtn = showCert
        ? `<button class="btn btn-ghost btn-block" style="margin-top:10px;" onclick="openAchievementCert('${v}')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px;"><circle cx="12" cy="9" r="6"/><path d="M9 14l-2 7 5-3 5 3-2-7"/></svg>Télécharger mon certificat</button>`
        : "";
      let actionCard = "";
      if (acc.status === "passed") actionCard = `<div class="card"><h3 style="margin-bottom:8px;">Activer le compte financé</h3><p class="muted" style="font-size:0.92rem;margin-bottom:16px;">Active ton capital de ${SF.fmt(acc.capital)} (partage ${t.split}%).</p><button class="btn btn-primary btn-block btn-lg" onclick="doClaim('${v}')">Activer mon compte financé</button>${certBtn}</div>`;
      else if (acc.status === "failed") actionCard = `<div class="card center"><h3 style="margin-bottom:10px;">Relancer</h3><a class="btn btn-primary btn-block btn-lg" href="challenges.html?v=${v}">Nouveau challenge ${vertLabel(v)}</a></div>`;
      else { const nPend = (acc.pending || []).length; actionCard = `<div class="card"><h3 style="margin-bottom:6px;">${v === "predictions" ? "Trader des marchés" : "Parier"}</h3><p class="muted" style="font-size:0.9rem;margin-bottom:16px;">${v === "predictions" ? "Achète des positions YES/NO sur les grands marchés Polymarket." : "Place tes paris sur les matchs à venir."}${nPend ? ` Tu as <b style="color:var(--orange)">${nPend} ${unit === "positions" ? "position(s)" : "pari(s)"} en cours</b>.` : ''}</p><button class="btn btn-primary btn-block btn-lg" onclick="go('${vertGoTo(v)}')">Aller à ${vertLabel(v)}</button></div>`; }
      let payoutCard = "";
      if (acc.phase === "funded") {
        const totalWithdrawn = acc.withdrawn || 0;
        payoutCard = `<div class="card">
          <h3 style="margin-bottom:14px;">Retrait</h3>
          <p class="muted" style="font-size:0.82rem;margin-bottom:14px;">Tu peux demander un retrait à tout moment dès qu'il y a du profit. Traitement sous 24 h en USDC, Wise ou virement bancaire.</p>
          <div class="rule-row"><span class="muted">Profit en cours sur ce cycle</span><b class="${pos ? 'ok' : 'bad'}">${pos ? '+' : ''}${SF.fmt2(s.profit)}</b></div>
          <div class="rule-row"><span class="muted">Ta part (${t.split} %)</span><b style="color:var(--orange)">${SF.fmt2(s.withdrawable)}</b></div>
          <div class="rule-row"><span class="muted">Total déjà retiré</span><b>${SF.fmt2(totalWithdrawn)}</b></div>
          <div class="rule-row"><span class="muted">Délai de traitement</span><b>≤ 24 h</b></div>
          <button class="btn btn-primary btn-block" style="margin-top:14px;" onclick="doWithdraw('${v}')" ${s.withdrawable <= 0 ? 'disabled' : ''}>Demander un retrait</button>
          <p class="muted" style="font-size:0.78rem;margin-top:12px;">Après retrait, ton solde repart au capital de ${SF.fmt(acc.capital)} pour le cycle suivant. Aucun plafond, aucun délai imposé entre deux retraits.</p>
          ${certBtn}
        </div>`;
      }
      return `
        ${banner}
        <div class="dash-head" style="margin-bottom:18px;"><div class="muted" style="font-size:0.74rem;text-transform:uppercase;letter-spacing:0.12em;">${vertLabel(v)} · ${t.name} · ${SF.fmt(acc.capital)}</div></div>
        <div class="kpi-grid">
          <div class="kpi"><div class="k">Solde</div><div class="v">${SF.fmt2(acc.balance)}</div><div class="sub">Capital ${SF.fmt(acc.capital)}</div></div>
          <div class="kpi"><div class="k">Profit</div><div class="v ${pos ? 'pos' : 'neg'}">${pos ? '+' : ''}${SF.fmt2(s.profit)}</div><div class="sub">${pos ? '+' : ''}${s.profitPct}%</div></div>
          <div class="kpi"><div class="k">Win rate</div><div class="v">${s.winRate}%</div><div class="sub">${s.wins}V / ${s.losses}D</div></div>
          <div class="kpi"><div class="k">ROI</div><div class="v ${s.roi >= 0 ? 'pos' : 'neg'}">${s.roi >= 0 ? '+' : ''}${s.roi}%</div><div class="sub">${s.bets} ${unit}</div></div>
        </div>
        <div class="dash-grid">
          <div style="display:flex;flex-direction:column;gap:22px;">
            <div class="card">
              <h3 style="margin-bottom:14px;">${acc.phase === "funded" ? "Profit du cycle" : "Progression"}</h3>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:center;justify-items:center;">
                <div style="text-align:center;">
                  <div class="muted" style="font-size:0.74rem;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;">Objectif</div>
                  ${ring(targetPct / 100, (s.profitPct >= 0 ? '+' : '') + s.profitPct + '%', '/ +' + t.target + '%')}
                  <div class="muted" style="font-size:0.78rem;margin-top:10px;">Cible ${SF.fmt(s.targetBal)}</div>
                </div>
                <div style="text-align:center;">
                  <div class="muted" style="font-size:0.74rem;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;">Drawdown</div>
                  ${ring(ddPct / 100, Math.max(0, Math.round(ddPct)) + '%', 'utilisé')}
                  <div class="muted" style="font-size:0.78rem;margin-top:10px;">Plancher ${SF.fmt(s.ddFloor)}</div>
                </div>
              </div>
            </div>
            ${actionCard}
          </div>
          <div style="display:flex;flex-direction:column;gap:22px;">
            <div class="card">
              <h3 style="margin-bottom:10px;">Conditions de réussite</h3>
              <p class="muted" style="font-size:0.82rem;margin-bottom:14px;">Toutes les conditions doivent être remplies AVANT la date limite. Le drawdown ne doit jamais être dépassé, à aucun moment.</p>
              <div class="rule-row"><span class="muted">Objectif de profit</span><span><b style="margin-right:8px;">+${t.target}% en ${t.timeLimitDays} j</b>${cMark(s.profit >= s.targetProfit)}</span></div>
              <div class="rule-row"><span class="muted">Drawdown total max</span><span><b style="margin-right:8px;">${t.maxDD}% (plancher ${SF.fmt(s.ddFloor)})</b>${cMark(ddPct <= t.maxDD && acc.status !== 'failed')}</span></div>
              <div class="rule-row"><span class="muted">Drawdown journalier max</span><b>${t.maxDailyLoss}%</b></div>
              <div class="rule-row"><span class="muted">${v === "predictions" ? "Exposition max / marché" : "Mise par pari"}</span><b>${t.minStakePct ? t.minStakePct + "% – " : ""}${t.maxStakePct}% du capital</b></div>
              <div class="rule-row"><span class="muted">${unit === "positions" ? "Positions valides" : "Paris valides"}</span><span><b style="margin-right:8px;">${s.bets} / ${t.minBets}</b>${cMark(s.bets >= t.minBets)}</span></div>
              <div class="rule-row"><span class="muted">Jours actifs</span><span><b style="margin-right:8px;">${s.activeDays} / ${t.minActiveDays}</b>${cMark(s.activeDays >= t.minActiveDays)}</span></div>
              <div class="rule-row"><span class="muted">Semaines positives</span><span><b style="margin-right:8px;">${s.positiveWeeks} / ${t.totalWeeks}</b>${cMark(s.positiveWeeks >= t.positiveWeeks)}</span></div>
              <div class="rule-row"><span class="muted">Délai restant</span><b>${s.daysRemaining} / ${t.timeLimitDays} j</b></div>
            </div>
            ${payoutCard}
          </div>
        </div>

        <div class="dash-grid" style="margin-top:22px;">
          <div class="card">
            <h3 style="margin-bottom:14px;">Suivi du compte</h3>
            <div class="rule-row"><span class="muted">Date de démarrage</span><b>${dateShort(acc.startedAt)}</b></div>
            ${acc.fundedAt ? `<div class="rule-row"><span class="muted">Compte financé activé le</span><b style="color:var(--green)">${dateShort(acc.fundedAt)}</b></div>` : ''}
            <div class="rule-row"><span class="muted">Statut actuel</span><b>${acc.status === 'funded' ? '<span class="pos">Compte financé actif</span>' : acc.status === 'passed' ? '<span class="pos">Évaluation réussie</span>' : acc.status === 'failed' ? '<span class="neg">Terminé · ' + SF.escapeHtml(acc.failReason || '') + '</span>' : 'En évaluation'}</b></div>
            <div class="rule-row"><span class="muted">Pic de solde atteint</span><b>${SF.fmt2(acc.peak)}</b></div>
            ${acc.phase === 'funded' ? `<div class="rule-row"><span class="muted">Total retiré sur ce compte</span><b style="color:var(--orange)">${SF.fmt2(acc.withdrawn || 0)}</b></div>` : ''}
            <div class="rule-row"><span class="muted">Vertical</span><b>${vertLabel(v)} · ${SF.escapeHtml(t.name)}</b></div>
            <div class="rule-row"><span class="muted">Capital confié</span><b>${SF.fmt(acc.capital)}</b></div>
            <div class="rule-row"><span class="muted">Partage des gains</span><b style="color:var(--orange)">${t.split} %</b></div>

          <div class="card">
            <h3 style="margin-bottom:14px;">Statistiques détaillées</h3>
            ${s.bets === 0 ? '<p class="muted" style="font-size:0.88rem;">Place ton premier pari pour voir tes stats apparaître.</p>' : `
              <div class="rule-row"><span class="muted">Mise moyenne</span><b>${SF.fmt2(ext.avgStake)} <span class="muted" style="font-weight:500;">(${((ext.avgStake / acc.capital) * 100).toFixed(2)} %)</span></b></div>
              <div class="rule-row"><span class="muted">Mise max prise</span><b>${SF.fmt2(ext.maxStake)} <span class="${ext.maxStakePctTaken > t.maxStakePct ? 'neg' : 'muted'}" style="font-weight:500;">(${ext.maxStakePctTaken.toFixed(2)} % / ${t.maxStakePct} % max)</span></b></div>
              <div class="rule-row"><span class="muted">${v === "predictions" ? "Prix moyen" : "Cote moyenne"}</span><b>${ext.avgOdds.toFixed(2)}</b></div>
              <div class="rule-row"><span class="muted">Meilleur ${unit === "positions" ? "trade" : "pari"}</span><b class="pos">+${SF.fmt2(ext.bestPnl)}</b></div>
              <div class="rule-row"><span class="muted">Pire ${unit === "positions" ? "trade" : "pari"}</span><b class="neg">${SF.fmt2(ext.worstPnl)}</b></div>
              <div class="rule-row"><span class="muted">Série en cours</span><b class="${ext.currentStreak.type === 'win' ? 'pos' : 'neg'}">${ext.currentStreak.count} ${ext.currentStreak.type === 'win' ? 'victoire(s)' : 'défaite(s)'} consécutive(s)</b></div>
              <div class="rule-row"><span class="muted">Win rate</span><b>${s.winRate} % <span class="muted" style="font-weight:500;">(${s.wins} V / ${s.losses} D)</span></b></div>
              <div class="rule-row"><span class="muted">ROI cumulé</span><b class="${s.roi >= 0 ? 'pos' : 'neg'}">${s.roi >= 0 ? '+' : ''}${s.roi} % <span class="muted" style="font-weight:500;">sur ${SF.fmt2(s.staked)} misés</span></b></div>
            `}
          </div>
        </div>

        <div class="card" style="margin-top:22px;">
          <h3 style="margin-bottom:8px;">Historique ${vertLabel(v)}</h3>
          ${acc.bets.length === 0 ? '<div class="empty">Aucune activité pour le moment.</div>' : `<div style="overflow-x:auto;"><table class="history"><thead><tr><th>Date</th><th>Événement</th><th>Mise</th><th>Cote</th><th>Résultat</th><th>P&amp;L</th><th>Solde</th></tr></thead><tbody>${acc.bets.map(b => `<tr><td class="muted">${SF.fmtDate(b.date)}</td><td>${SF.escapeHtml(b.event)}</td><td>${SF.fmt2(b.stake)}</td><td>${b.odds.toFixed(2)}</td><td>${b.result === "win" ? '<span class="pos">Gagné</span>' : '<span class="neg">Perdu</span>'}</td><td class="${b.pnl >= 0 ? 'pos' : 'neg'}">${b.pnl >= 0 ? '+' : ''}${SF.fmt2(b.pnl)}</td><td>${SF.fmt2(b.balanceAfter)}</td></tr>`).join("")}</tbody></table></div>`}
        </div>`;
    }

    function viewChallenges() {
      const all = SF.activeAccounts();
      if (!all.length) return `<div class="card center" style="padding:46px;"><h3 style="margin-bottom:10px;">Aucun challenge actif</h3><p class="muted" style="margin-bottom:22px;">Choisis ton premier challenge — Sports ou Prédictions — pour démarrer ton évaluation.</p><div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;"><a class="btn btn-primary btn-lg" href="challenges.html?v=sports">${ICN_SPORT} Challenge Sports</a><a class="btn btn-ghost btn-lg" href="challenges.html?v=predictions">${ICN_CHART} Challenge Prédictions</a></div></div>`;
      // Affiche un sélecteur si les deux verticales sont actives
      const verticals = all.map(a => a.vertical || (a.tier && a.tier.vertical) || "sports");
      const missingVertical = !verticals.includes("sports") ? "sports" : (!verticals.includes("predictions") ? "predictions" : null);
      let tabs = "";
      if (all.length >= 2) {
        const params = new URLSearchParams(location.hash.split("?")[1] || "");
        const cur = params.get("v") || verticals[0];
        tabs = `<div class="seg" style="margin-bottom:18px;">
          ${verticals.map(v => `<button class="${v === cur ? 'active' : ''}" onclick="location.hash='challenges?v=${v}'">${vertLabel(v)}</button>`).join("")}
        </div>`;
        const acc = all.find(a => (a.vertical || a.tier.vertical) === cur) || all[0];
        return tabs + renderChallengeCard(acc);
      }
      const main = renderChallengeCard(all[0]);
      const addCta = missingVertical ? `<div class="card center" style="padding:26px;margin-top:22px;border:1px dashed var(--border-strong);background:transparent;">
        <h3 style="margin-bottom:6px;">Active aussi le marché ${vertLabel(missingVertical)}</h3>
        <p class="muted" style="margin-bottom:16px;font-size:0.92rem;">${missingVertical === "predictions" ? "Étends ton edge aux marchés prédictifs — politique, tech, macro, sport. Bankroll dédiée, règles adaptées." : "Ajoute le marché sportif à ton arsenal — football, tennis, basket, e-sport. Bankroll dédiée, règles adaptées."}</p>
        <a class="btn btn-primary" href="challenges.html?v=${missingVertical}">Démarrer un challenge ${vertLabel(missingVertical)}</a>
      </div>` : "";
      return main + addCta;
    }

    /* ---------- Marchés prédictifs (Polymarket) ---------- */
    let pmMarkets = null, pmLoading = false, pmError = null, pmCategory = "all", pmSlip = null, pmSearch = "", pmSort = "endDate";
    let pmAutoRefreshTimer = null;  // setInterval ID quand on est sur Crypto (live 5min markets)
    let pmLastRefreshAt = null;     // timestamp du dernier auto-refresh pour le badge UI
    let pmPositions = null, pmPositionsLoading = false;

    // Pull l'historique complet des positions Polymarket de l'user depuis Supabase
    async function loadPositions(force) {
      if (pmPositionsLoading) return;
      if (pmPositions && !force) return;
      pmPositionsLoading = true;
      try {
        if (window.SpovibePolymarket) {
          // Auto-settle d'abord : pour chaque position open dont le marché est résolu,
          // on règle automatiquement (won/lost/cancelled) + crédit balance si gagnant.
          if (SpovibePolymarket.settleMyOpenPositions) {
            try { await SpovibePolymarket.settleMyOpenPositions(); } catch (e) { console.warn("auto-settle:", e); }
          }
          if (SpovibePolymarket.listAllPositions) {
            pmPositions = await SpovibePolymarket.listAllPositions();
          } else { pmPositions = []; }
        } else {
          pmPositions = [];
        }
      } catch (e) { console.warn(e); pmPositions = []; }
      pmPositionsLoading = false;
      if (current() === "predictions") render();
    }

    function startCryptoAutoRefresh() {
      if (pmAutoRefreshTimer) return;
      pmAutoRefreshTimer = setInterval(async () => {
        // Self-stop si l'user a changé de catégorie ou quitté la vue prédictions
        if (pmCategory !== "crypto" || current() !== "predictions") {
          stopCryptoAutoRefresh(); return;
        }
        if (pmLoading) return;  // skip si refresh manuel déjà en cours
        try {
          SpovibePolymarket.clearCache();
          await loadPolymarket(true);
          pmLastRefreshAt = Date.now();
        } catch (e) { console.warn("auto-refresh crypto:", e); }
      }, 30000);
    }
    function stopCryptoAutoRefresh() {
      if (pmAutoRefreshTimer) { clearInterval(pmAutoRefreshTimer); pmAutoRefreshTimer = null; }
    }
    // Stop quand l'user navigue ailleurs ou ferme la page
    window.addEventListener("hashchange", () => { if (current() !== "predictions") stopCryptoAutoRefresh(); });
    window.addEventListener("beforeunload", stopCryptoAutoRefresh);
    async function loadPolymarket(force) {
      if (pmLoading) return;
      pmLoading = true; pmError = null;
      try {
        // Module SpovibePolymarket (assets/polymarket.js) — fetch direct Gamma API + cache 10 min
        pmMarkets = await SpovibePolymarket.getMarkets({ bypassCache: !!force });
      } catch (e) {
        pmError = e.message || "Polymarket inaccessible";
        pmMarkets = pmMarkets || [];
      }
      pmLoading = false;
      if (current() === "predictions") render();
    }

    function viewPredictions() {
      const acc = SF.predictionsAccount();
      // Mode "teaser" = pas de compte actif OU compte non actif (échoué/réussi en attente d'activation)
      const isActive = !!(acc && (acc.status === "active" || acc.status === "funded"));
      const locked = !isActive;
      // Charge les marchés dans tous les cas
      if (pmMarkets === null && !pmLoading) loadPolymarket();
      // Charge l'historique des positions au 1er affichage (pour user actif)
      if (isActive && pmPositions === null && !pmPositionsLoading) loadPositions();

      let header = "";
      if (locked) {
        // Bannière CTA en haut + on continue à afficher les marchés en preview
        const reason = !acc
          ? "Ce sont les marchés que tu pourras trader avec ta bankroll Spovibe — politique, crypto, sport, tech, macro. Lance ton challenge Prédictions pour commencer à parier."
          : (acc.status === "passed"
              ? "Ton évaluation Prédictions est réussie ! Active ton compte financé pour reprendre tes positions."
              : "Ce challenge Prédictions est terminé. Relances-en un nouveau pour reprendre.");
        const ctaLabel = !acc ? "Démarrer un challenge Prédictions" : (acc.status === "passed" ? "Activer mon compte financé" : "Relancer un challenge");
        const ctaHref = !acc ? "challenges.html?v=predictions" : (acc.status === "passed" ? "#challenges" : "challenges.html?v=predictions");
        header = `<div class="pm-slip" style="margin-bottom:18px;background:linear-gradient(135deg, var(--orange) 0%, var(--orange-2) 100%);border-color:transparent;color:#fff;">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;">
            <div style="flex:1;min-width:220px;">
              <div style="font-size:0.7rem;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.85);font-weight:700;">${!acc ? "Prévisualisation" : "Compte inactif"}</div>
              <div style="font-weight:800;font-size:1.2rem;color:#fff;margin-top:4px;">${!acc ? "Marchés en direct, prix réels, volumes réels" : "Marchés en lecture seule"}</div>
              <p style="color:rgba(255,255,255,0.92);font-size:0.94rem;margin-top:6px;line-height:1.5;">${reason}</p>
            </div>
            <a class="btn" style="background:#fff;color:var(--orange);font-weight:800;border-color:transparent;" href="${ctaHref}">${ctaLabel}</a>
          </div>
        </div>`;
      }

      // Stats en haut (compte actif) ou teaser-stats (locked)
      let stats;

        const pend = (acc.pending || []).filter(p => p.kind === "prediction" || p.kind === "polymarket");
        stats = `<div class="kpi-grid" style="grid-template-columns:repeat(3,1fr);">
          <div class="kpi"><div class="k">Solde disponible</div><div class="v">${SF.fmt2(avail)}</div><div class="sub">sur ${SF.fmt2(acc.balance)}</div></div>
          <div class="kpi"><div class="k">Mise max / position</div><div class="v">${SF.fmt(maxStake)}</div><div class="sub">${acc.tier.maxStakePct}% du capital</div></div>
          <div class="kpi"><div class="k">Positions en cours</div><div class="v">${pend.length}</div><div class="sub">${pend.length ? 'à régler' : 'aucune'}</div></div>
        </div>`;
      } else {
        // Teaser : ce que tu pourrais avoir
        stats = `<div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);">
          <div class="kpi"><div class="k">Bankroll à viser</div><div class="v" style="color:var(--orange)">5k → 100k €</div><div class="sub">5 paliers HT 97 → 1 697 €</div></div>
          <div class="kpi"><div class="k">Objectif</div><div class="v">+35 % / 30 j</div><div class="sub">Compte financé à la clé</div></div>
          <div class="kpi"><div class="k">Expo max / marché</div><div class="v">5 %</div><div class="sub">Adaptée aux positions longues</div></div>
          <div class="kpi"><div class="k">Partage des gains</div><div class="v" style="color:var(--green)">85 %</div><div class="sub">Retrait sous 24 h</div></div>
        </div>`;
      }

      let info = "";
      if (pmLoading && !pmMarkets) info = `<div class="pm-loading">Chargement des marchés depuis Polymarket…</div>`;
      if (pmError) info = `<div class="pm-warn">⚠ API Polymarket inaccessible (${SF.escapeHtml(pmError)}). <button class="btn btn-ghost btn-sm" style="margin-left:6px;padding:4px 10px;" onclick="pmRefresh()">Réessayer</button></div>`;

      let slipHtml = "";
      if (isActive && pmSlip) {
        const avail = SF.availableBalance(acc), maxStake = acc.capital * acc.tier.maxStakePct / 100;
        const sideClass = pmSlip.side === "YES" ? "yes" : "no";
        slipHtml = `<div class="pm-slip">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><b>Ta position</b><button class="btn btn-ghost btn-sm" onclick="pmClear()">Annuler</button></div>
          <div class="pm-slip-q">${SF.escapeHtml(pmSlip.question)}</div>
          <div class="pm-slip-side ${sideClass}">${SF.escapeHtml(pmSlip.label || pmSlip.side)} · ${Math.round(pmSlip.price * 100)}¢</div>
          <div class="alert error" id="pmAlert"></div>
          <div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;">
            <div class="field" style="margin:0;flex:1;min-width:160px;"><label>Mise (€) · max ${SF.fmt(maxStake)}</label><input class="input" id="pmStake" type="number" min="1" step="1" placeholder="ex. ${Math.round(maxStake)}"></div>
            <button class="btn btn-primary" onclick="pmConfirm()">Placer la position</button>
          </div>
          <div class="muted" style="font-size:0.85rem;margin-top:10px;">Si <b style="color:var(--text)">${SF.escapeHtml(pmSlip.label || pmSlip.side)}</b> se réalise, gain = mise × ${(1 / pmSlip.price).toFixed(2)}.</div>
        </div>`;
      }

      let pendHtml = "";
      if (isActive) {
        const pend = (acc.pending || []).filter(p => p.kind === "prediction" || p.kind === "polymarket");
        if (pend.length) pendHtml = `<div class="card" style="margin-bottom:18px;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><h3>Positions en cours (${pend.length})</h3><button class="btn btn-primary btn-sm" onclick="doSettle('predictions')">Simuler les résultats</button></div>${pend.map(p => `<div class="pending-row"><div><b>${SF.escapeHtml(p.event || p.question || "Marché")}</b><div class="muted" style="font-size:0.8rem;">${SF.escapeHtml(p.pickName || p.side || "Yes")} @ ${Math.round((p.price || 1 / (p.odds || 1)) * 100)}¢</div></div><div style="text-align:right;"><div>${SF.fmt2(p.stake)}</div><div class="muted" style="font-size:0.8rem;">${p.odds ? 'gain ' + SF.fmt2(p.stake * p.odds) : ''}</div></div></div>`).join("")}</div>`;
      }

      // ---------- Historique des positions (depuis Supabase) ----------
      let historyHtml = "";
      if (isActive) {
        const positions = pmPositions || [];
        const open = positions.filter(p => p.status === "open");
        const settled = positions.filter(p => p.status !== "open").slice(0, 20);  // 20 dernières
        if (pmPositionsLoading && !positions.length) {
          historyHtml = `<div class="card" style="margin-bottom:18px;"><h3 style="margin-bottom:10px;">Mes positions</h3><p class="muted">Chargement de l'historique…</p></div>`;
        } else if (positions.length) {
          const totalWon = positions.filter(p => p.status === "won").reduce((s, p) => s + Number(p.payout || 0) - Number(p.stake || 0), 0);
          const totalLost = positions.filter(p => p.status === "lost").reduce((s, p) => s + Number(p.stake || 0), 0);
          const pnlHistory = totalWon - totalLost;
          const formatPos = p => {
            const sideLabel = p.side === "Yes" ? "Yes" : "No";
            const pricePct = Math.round(Number(p.price_at_entry) * 100);
            const dt = p.opened_at ? new Date(p.opened_at).toLocaleString("fr-FR", { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" }) : "";
            let badge = "", pnl = "";
            if (p.status === "open") {
              const endMs = p.end_date ? new Date(p.end_date).getTime() : null;
              const isExpired = endMs && endMs < Date.now();
              badge = isExpired
                ? `<span style="background:rgba(249,115,22,0.14);color:#ea580c;padding:3px 9px;border-radius:99px;font-size:0.72rem;font-weight:700;">Résolution en attente</span>`
                : `<span style="background:rgba(124,107,246,0.12);color:var(--lavande);padding:3px 9px;border-radius:99px;font-size:0.72rem;font-weight:700;">En cours</span>`;
              pnl = `<div class="muted" style="font-size:0.8rem;">mise ${SF.fmt2(p.stake)}</div>`;
            } else if (p.status === "won") {
              const profit = Number(p.payout) - Number(p.stake);
              badge = `<span style="background:rgba(34,197,94,0.14);color:#16a34a;padding:3px 9px;border-radius:99px;font-size:0.72rem;font-weight:700;">Gagné ✓</span>`;
              pnl = `<div style="color:#16a34a;font-weight:700;">+${SF.fmt2(profit)}</div><div class="muted" style="font-size:0.78rem;">payout ${SF.fmt2(p.payout)}</div>`;
            } else if (p.status === "lost") {
              badge = `<span style="background:rgba(239,68,68,0.14);color:#dc2626;padding:3px 9px;border-radius:99px;font-size:0.72rem;font-weight:700;">Perdu ✗</span>`;
              pnl = `<div style="color:#dc2626;font-weight:700;">−${SF.fmt2(p.stake)}</div>`;
            } else {
              badge = `<span style="background:var(--bg-2);color:var(--muted);padding:3px 9px;border-radius:99px;font-size:0.72rem;font-weight:700;">${p.status}</span>`;
              pnl = `<div class="muted">${SF.fmt2(p.stake)}</div>`;
            }
            return `<div class="pending-row" style="align-items:flex-start;">
              <div style="flex:1;min-width:0;">
                <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px;">
                  ${badge}
                  <span class="muted" style="font-size:0.74rem;">${dt}</span>
                </div>
                <b style="display:block;line-height:1.4;">${SF.escapeHtml(p.market_question || "Marché")}</b>
                <div class="muted" style="font-size:0.82rem;margin-top:2px;">Pari sur <b style="color:var(--text);">${SF.escapeHtml(sideLabel)}</b> à ${pricePct}¢ · ${SF.escapeHtml(p.category || "Autres")}</div>
                ${p.resolved_outcome ? `<div class="muted" style="font-size:0.78rem;margin-top:3px;">Résultat : <b style="color:var(--text);">${SF.escapeHtml(p.resolved_outcome)}</b></div>` : ""}
              </div>
              <div style="text-align:right;flex:0 0 auto;margin-left:12px;">${pnl}</div>
            </div>`;
          };
          historyHtml = `<div class="card" style="margin-bottom:18px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
              <h3 style="margin:0;">Mes positions (${positions.length})</h3>
              <div style="display:flex;gap:14px;font-size:0.84rem;">
                <span>P&L cumulé : <b style="color:${pnlHistory >= 0 ? '#16a34a' : '#dc2626'};">${pnlHistory >= 0 ? '+' : ''}${SF.fmt2(pnlHistory)}</b></span>
                <button class="btn btn-ghost btn-sm" style="padding:4px 10px;font-size:0.78rem;" onclick="loadPositions(true)">Actualiser</button>
              </div>
            </div>
            ${open.length ? `<div style="font-size:0.78rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);font-weight:700;margin:14px 0 8px;">${open.length} ouverte${open.length > 1 ? 's' : ''}</div>${open.map(formatPos).join("")}` : ''}
            ${settled.length ? `<div style="font-size:0.78rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);font-weight:700;margin:18px 0 8px;">Réglées (${settled.length} dernières)</div>${settled.map(formatPos).join("")}` : ''}
            ${positions.length > 20 + open.length ? `<p class="muted" style="font-size:0.78rem;margin-top:14px;text-align:center;">Plus de ${20} positions réglées dans l'historique. Affichage limité aux 20 dernières.</p>` : ''}
          </div>`;
        } else {
          historyHtml = `<div class="card" style="margin-bottom:18px;padding:30px;text-align:center;"><h3 style="margin-bottom:6px;">Pas encore de positions</h3><p class="muted">Tes positions Polymarket apparaîtront ici dès ta première mise.</p></div>`;
        }
      }

      if (!pmMarkets) return header + stats + info + historyHtml;

      // Auto-refresh 30s pour la catégorie Crypto (marchés live 5min)
      if (pmCategory === "crypto" && !pmAutoRefreshTimer) startCryptoAutoRefresh();

      // Catégories Spovibe avec counts
      const catStats = SpovibePolymarket.categoryStats(pmMarkets);
      const totalCount = catStats.reduce((s, c) => s + c.count, 0);
      const ageSec = pmLastRefreshAt ? Math.floor((Date.now() - pmLastRefreshAt) / 1000) : null;
      const liveBadge = pmCategory === "crypto" ? `
        <div style="display:inline-flex;align-items:center;gap:8px;padding:6px 14px;background:linear-gradient(135deg,rgba(239,68,68,0.12),rgba(239,68,68,0.04));color:#dc2626;border-radius:99px;font-size:0.78rem;font-weight:700;border:1px solid rgba(239,68,68,0.2);">
          <span style="width:8px;height:8px;background:#dc2626;border-radius:50%;animation:sf-pulse 1.4s infinite;"></span>
          LIVE${ageSec != null ? ' · maj ' + (ageSec < 60 ? ageSec + 's' : Math.floor(ageSec / 60) + 'm') : ''}
        </div>
        <style>@keyframes sf-pulse { 0%, 100% { opacity:1; transform:scale(1); } 50% { opacity:0.4; transform:scale(0.85); } }</style>` : "";
      const catsHtml = `<div class="pm-cats">
        <button class="pm-cat ${pmCategory === 'all' ? 'active' : ''}" onclick="pmSetCat('all')">Tous (${totalCount})</button>
        ${catStats.filter(c => c.count > 0).map(c => `<button class="pm-cat ${c.slug === pmCategory ? 'active' : ''}" onclick="pmSetCat('${c.slug}')">${SF.escapeHtml(c.label)} (${c.count})</button>`).join("")}
      </div>
      <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center;">
        <input class="input" style="flex:1;min-width:200px;" placeholder="Rechercher un marché…" value="${SF.escapeHtml(pmSearch)}" oninput="pmSetSearch(this.value)">
        <select class="input" style="flex:0 0 200px;" onchange="pmSetSort(this.value)">
          <option value="endDate" ${pmSort === 'endDate' ? 'selected' : ''}>Fin proche ↑</option>
          <option value="volume24hr" ${pmSort === 'volume24hr' ? 'selected' : ''}>Volume 24 h ↓</option>
          <option value="volume" ${pmSort === 'volume' ? 'selected' : ''}>Volume total ↓</option>
          <option value="liquidity" ${pmSort === 'liquidity' ? 'selected' : ''}>Liquidité ↓</option>
        </select>
        ${liveBadge}
      </div>`;

      let filtered = pmCategory === "all" ? pmMarkets : pmMarkets.filter(m => m.category === pmCategory);
      if (pmSearch) {
        const q = pmSearch.toLowerCase().trim();
        filtered = filtered.filter(m => (m.question || "").toLowerCase().includes(q) || (m.eventTitle || "").toLowerCase().includes(q));
      }
      if (pmSort === "volume24hr") filtered = filtered.slice().sort((a, b) => b.volume24hr - a.volume24hr);
      else if (pmSort === "volume") filtered = filtered.slice().sort((a, b) => b.volume - a.volume);
      else if (pmSort === "endDate") filtered = filtered.slice().sort((a, b) => (a.endDateMs || Infinity) - (b.endDateMs || Infinity));
      else if (pmSort === "liquidity") filtered = filtered.slice().sort((a, b) => b.liquidity - a.liquidity);
      filtered = filtered.slice(0, 60);  // cap d'affichage

      const fmtVol = v => v >= 1e6 ? (v / 1e6).toFixed(1) + " M$" : v >= 1e3 ? (v / 1e3).toFixed(0) + " k$" : Math.round(v) + " $";
      const fmtEnd = d => d ? new Date(d).toLocaleDateString("fr-FR", { day: "numeric", month: "short", year: "numeric" }) : "";
      // En mode locked, les boutons YES/NO renvoient à l'achat de challenge
      const onYes = m => locked ? `location.href='challenges.html?v=predictions'` : `pmPickSide('${m.id}','YES')`;
      const onNo  = m => locked ? `location.href='challenges.html?v=predictions'` : `pmPickSide('${m.id}','NO')`;
      const cards = filtered.map(m => {
        const firstLetter = (m.question && m.question[0]) ? m.question[0].toUpperCase() : '?';
        return `<div class="pm-card ${pmSlip && pmSlip.marketId === m.id ? 'sel' : ''}" ${locked ? 'title="Lance ton challenge Prédictions pour parier"' : ''}>
          <div class="pm-h">
            <div class="pm-img">${m.image ? `<img src="${m.image}" alt="" onerror="this.parentNode.textContent='${firstLetter}'"/>` : firstLetter}</div>
            <div class="pm-meta">${SF.escapeHtml(m.categoryLabel || 'Autres')}${m.endDate ? ' · ' + fmtEnd(m.endDate) : ''}</div>
          </div>
          <h4>${SF.escapeHtml(m.question)}</h4>
          <div class="pm-prices">
            <button class="pm-yes" onclick="${onYes(m)}">${SF.escapeHtml(m.yesLabel || 'Oui')} · ${Math.round(m.yesPrice * 100)}¢</button>
            <button class="pm-no" onclick="${onNo(m)}">${SF.escapeHtml(m.noLabel || 'Non')} · ${Math.round(m.noPrice * 100)}¢</button>
          </div>
          <div class="pm-foot"><span>Vol. ${fmtVol(m.volume)}</span><span>Polymarket</span></div>
        </div>`;
      }).join("");

      const footNote = locked
        ? `<p class="muted" style="font-size:0.84rem;margin-top:14px;">Marchés en direct depuis <b style="color:var(--text)">Polymarket</b>. <a href="challenges.html?v=predictions" style="color:var(--orange);font-weight:700;">Lance ton challenge</a> pour trader avec une bankroll jusqu'à 100 000 €.</p>`
        : `<p class="muted" style="font-size:0.84rem;margin-top:14px;">Données en direct depuis <b style="color:var(--text)">Polymarket</b> (Gamma API publique). Tes positions sont en monnaie virtuelle et impactent la bankroll de ton challenge selon les mêmes règles que les paris sportifs.</p>`;

      return header + stats + info + slipHtml + pendHtml + historyHtml + catsHtml + `<div class="pm-grid">${cards || '<p class="muted">Aucun marché dans cette catégorie.</p>'}</div>` + footNote;
    }

    /* ---------- Arena (univers complet) ---------- */
    function viewArena() {
      const p = SF.poule(), a = SF.arena(), at = SF.arenaTourn(), c = SF.myCommunity(), bd = SF.badges(), ds = SF.getDuels();

      const season = SF.currentSeason();
      const daysToEnd = season.daysToEnd;

      const dayInSeason = totalSeasonDays - daysToEnd;
      const seasonPct = Math.min(100, Math.max(0, (dayInSeason / totalSeasonDays) * 100));

      // Ladder de progression
      const ladder = SF.DIVS.map(d => `<div class="lp-step ${d.id === a.division ? 'active' : ''} ${d.id === 'elite' ? 'elite' : ''}"><div class="lp-n">${d.name}</div><div class="lp-r">${d.id === 'elite' ? 'Financé' : ''}</div></div>`).join("");
