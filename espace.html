      const promoChip = season.inPromoWeek
        ? `<span style="display:inline-flex;align-items:center;gap:6px;background:#fff;color:var(--orange);padding:5px 12px;border-radius:99px;font-size:0.74rem;font-weight:800;letter-spacing:0.04em;text-transform:uppercase;"><span style="width:8px;height:8px;border-radius:50%;background:var(--orange);animation:vbPulse 2s infinite;"></span>Promotion Week — montées et descentes en direct</span>`
        : `<span style="display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.18);color:#fff;padding:5px 12px;border-radius:99px;font-size:0.74rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;border:1px solid rgba(255,255,255,0.22);">Promotion Week dans ${Math.max(0, daysToEnd - 7)} j</span>`;
      const seasonHero = `<div class="hero-bo" style="margin-bottom:18px;">
        <div style="flex:1;min-width:0;">
          <div class="h-tag">Saison ${season.monthLabel} · Spovibe Arena</div>
          <h2 style="margin:6px 0 6px;line-height:1.1;">${SF.escapeHtml(season.theme)}</h2>
          <p style="color:rgba(255,255,255,0.92);font-size:0.95rem;max-width:520px;line-height:1.5;margin-bottom:14px;">${SF.escapeHtml(season.subtitle)}</p>
          <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;">
            ${promoChip}
            <span style="display:inline-flex;align-items:center;gap:6px;background:rgba(0,0,0,0.18);color:rgba(255,255,255,0.92);padding:5px 12px;border-radius:99px;font-size:0.78rem;border:1px solid rgba(255,255,255,0.18);"><b style="color:#fff;">Top 15 %</b> promus en division supérieure</span>
            <span style="display:inline-flex;align-items:center;gap:6px;background:rgba(0,0,0,0.18);color:rgba(255,255,255,0.92);padding:5px 12px;border-radius:99px;font-size:0.78rem;border:1px solid rgba(255,255,255,0.18);"><b style="color:#fff;">1ᵉʳ Champion</b> = compte financé 100 k €</span>
          </div>
          <div style="margin-top:14px;background:rgba(0,0,0,0.18);border:1px solid rgba(255,255,255,0.2);border-radius:99px;height:8px;overflow:hidden;max-width:520px;"><div style="height:100%;width:${seasonPct}%;background:linear-gradient(90deg,#fff,rgba(255,255,255,0.7));border-radius:99px;"></div></div>
          <div style="display:flex;justify-content:space-between;max-width:520px;font-size:0.74rem;color:rgba(255,255,255,0.78);margin-top:6px;"><span>J${dayInSeason} / ${totalSeasonDays}</span><span>${season.monthLabelShort} · ${season.start.getFullYear()}</span></div>
        </div>
        <div class="h-side" style="text-align:center;">
          <div style="font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.75);font-weight:700;margin-bottom:4px;">Fin de saison</div>
          <div style="font-size:3.2rem;font-weight:900;letter-spacing:-0.04em;line-height:1;color:#fff;">J-${daysToEnd}</div>
          <div style="font-size:0.78rem;color:rgba(255,255,255,0.85);margin-top:4px;">${season.end.toLocaleDateString("fr-FR", { day: "numeric", month: "short" })}</div>
        </div>
      </div>`;

      // Bandeau « Ta position » qui rend le statut joueur en 1 coup d'œil
      const myZone = me.rank <= p.promoMax ? `<b class="pos">Zone de montée</b> · au top 15 % tu monteras en division supérieure` : me.rank >= p.relegMin ? `<b class="neg">Zone de descente</b> · sors du bottom 15 % avant fin de saison` : `<b style="color:var(--orange)">Zone de maintien</b> · vise le top 15 % pour grimper`;
      const myStatusCard = `<div class="card" style="margin-bottom:18px;display:flex;gap:24px;align-items:center;flex-wrap:wrap;">
        <div style="flex:0 0 auto;">
          <div class="muted" style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.12em;font-weight:700;">Ta position</div>
          <div style="display:flex;align-items:baseline;gap:8px;margin-top:4px;"><span style="font-size:2.2rem;font-weight:900;color:var(--orange);letter-spacing:-0.03em;line-height:1;">${p.divName}</span><span class="muted" style="font-size:0.86rem;">poule #${a.poule}</span></div>
        </div>
        <div style="flex:1;min-width:200px;border-left:1px solid var(--border);padding-left:24px;">
          <div class="muted" style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.12em;font-weight:700;">Rang</div>
          <div style="font-size:1.5rem;font-weight:800;letter-spacing:-0.02em;margin-top:4px;">${me.rank}<span class="muted" style="font-size:1rem;font-weight:500;"> / ${p.total}</span> <span style="font-size:0.92rem;font-weight:700;" class="${me.roi >= 0 ? 'pos' : 'neg'}">· ROI ${me.roi >= 0 ? '+' : ''}${me.roi}%</span></div>
          <div class="muted" style="font-size:0.84rem;margin-top:4px;">${myZone}</div>
        </div>
      </div>`;

      // Cartes tournois — la Soirée adopte le thème de la saison
      const soireeCard = `<div class="tn-card ${at.soireeRegistered ? 'live' : ''}">
        <span class="tn-tag">Cette semaine · ${SF.escapeHtml(season.tag)}</span>
        <h3>Soirée ${SF.escapeHtml(season.theme)}</h3>
        <p>Tournoi flash thématique sur les événements ${SF.escapeHtml(season.tag.toLowerCase())} de la semaine. <b style="color:var(--text)">1 247 inscrits</b>.</p>
        <button class="btn ${at.soireeRegistered ? 'btn-ghost' : 'btn-primary'} btn-block" onclick="doToggleSoiree()">${at.soireeRegistered ? '✓ Inscrit · Se désinscrire' : "S'inscrire"}</button>
      </div>`;
      let survivorBody;
      if (!at.survivor.entered) survivorBody = `<p>Format élimination : un mauvais prono et tu sors. Round 1 ouvert, <b style="color:var(--text)">312 survivants</b>.</p><button class="btn btn-primary btn-block" onclick="doSurvivorEnter()">Entrer en lice</button>`;
      else if (at.survivor.eliminated) survivorBody = `<p>Éliminé au <b style="color:var(--text)">round ${at.survivor.round}</b>. Le prochain Survivor démarre bientôt.</p><button class="btn btn-ghost btn-block" onclick="doSurvivorRestart()">Réinitialiser</button>`;
      else survivorBody = `<p>Tu es <b style="color:var(--text)">en lice au round ${at.survivor.round}</b>. Fais ton prono pour passer au tour suivant.</p><button class="btn btn-primary btn-block" onclick="doSurvivorPick()">Faire mon prono</button>`;
      const survivorCard = `<div class="tn-card ${at.survivor.entered && !at.survivor.eliminated ? 'live' : ''}"><span class="tn-tag">Survivor</span><h3>Dernier survivant</h3>${survivorBody}</div>`;
      const cupCard = c ? `<div class="tn-card live"><span class="tn-tag">Cup en cours</span><h3>Cup ${SF.escapeHtml(c.name)}</h3><p>Tu participes à la Cup de <b style="color:var(--text)">${SF.escapeHtml(c.name)}</b>. Selon les résultats, toute la communauté débloque des réductions.</p><button class="btn btn-ghost btn-block" onclick="go('community')">Ouvrir la communauté</button></div>`
        : `<div class="tn-card"><span class="tn-tag">Cup de créateur</span><h3>Rejoins une Cup</h3><p>Les Cups de créateurs sont privées. Demande son code à ton créateur préféré pour rejoindre, et toute la communauté débloque des réductions.</p><button class="btn btn-ghost btn-block" onclick="go('community')">Rejoindre / créer</button></div>`;
      const mastersCard = `<div class="tn-card ${season.inPromoWeek ? 'live' : ''}"><span class="tn-tag">Fin de saison · J-${daysToEnd}</span><h3>La grande finale</h3><p>Couronnement des nouveaux Élite à la fin de ${season.monthLabelShort}. Les meilleurs des poules Champion décrochent un <b style="color:var(--text)">compte financé</b>.</p><button class="btn btn-ghost btn-block" onclick="go('challenges')">Voir mon challenge</button></div>`;

      // Duels
      const pending = ds.filter(d => !d.settled), played = ds.filter(d => d.settled);
      const duelsHtml = `
        <div class="card" style="margin-bottom:14px;">
          <h3 style="margin-bottom:10px;">Défier un ami</h3>
          <div class="alert error" id="duAlert"></div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;">
            <div class="field" style="margin:0;flex:1;min-width:160px;"><label>Pseudo de l'adversaire</label><input class="input" id="duOpp" placeholder="ex. TontonBankroll"></div>
            <button class="btn btn-primary" onclick="doCreateDuel()">Envoyer le défi</button>
          </div>
          <p class="muted" style="font-size:0.8rem;margin-top:10px;">Ton ami reçoit une invitation. Le duel se joue au ROI sur la période (7 jours par défaut). En démo, un adversaire fictif est créé.</p>
        </div>
        ${pending.length ? `<div class="card" style="margin-bottom:14px;"><h3 style="margin-bottom:6px;">Duels en cours (${pending.length})</h3>${pending.map(d => `<div class="duel-row"><div class="vs"><b>vs ${SF.escapeHtml(d.opponent)}</b><span class="x">Période ${d.days} j · adv. ROI ${d.opponentRoi >= 0 ? '+' : ''}${d.opponentRoi}%</span></div><div class="scores"><span class="${d.myRoi >= d.opponentRoi ? 'pos' : 'neg'}">Toi ${d.myRoi >= 0 ? '+' : ''}${d.myRoi}%</span></div><button class="btn btn-primary btn-sm" onclick="doSettleDuel('${d.id}')">Régler</button></div>`).join("")}</div>` : ''}
        ${played.length ? `<div class="card"><h3 style="margin-bottom:6px;">Historique des duels</h3>${played.map(d => `<div class="duel-row"><div class="vs"><b>vs ${SF.escapeHtml(d.opponent)}</b><span class="x">${SF.fmtDate(d.createdAt)}</span></div><div class="scores"><span class="muted">${d.myRoi >= 0 ? '+' : ''}${d.myRoi}% · ${d.opponentRoi >= 0 ? '+' : ''}${d.opponentRoi}%</span><span class="${d.myWin ? 'pos' : 'neg'}">${d.myWin ? 'Victoire' : 'Défaite'}</span></div><button class="btn btn-ghost btn-sm" onclick="doDeleteDuel('${d.id}')">Suppr.</button></div>`).join("")}</div>` : ''}
      `;

      // Leaderboard
      const zone = r => r <= p.promoMax ? '<span class="pos" style="font-size:0.74rem;">Montée</span>' : r >= p.relegMin ? '<span class="neg" style="font-size:0.74rem;">Descente</span>' : '<span class="muted" style="font-size:0.74rem;">Maintien</span>';
      let display = p.rows.slice(0, 10);
      if (me.rank > 11) { display.push(null); p.rows.filter(r => r.rank >= me.rank - 1 && r.rank <= me.rank + 1).forEach(r => display.push(r)); }
      const row = r => r === null
        ? `<tr><td colspan="5" class="muted" style="text-align:center;">· · ·</td></tr>`
        : `<tr style="${r.you ? 'background:var(--orange-soft);' : ''}"><td><b>${r.rank}</b></td><td>${r.you ? '<b style="color:var(--orange)">' + SF.escapeHtml(r.name) + ' (vous)</b>' : SF.escapeHtml(r.name)}</td><td>${r.bets}</td><td class="${r.roi >= 0 ? 'pos' : 'neg'}">${r.roi >= 0 ? '+' : ''}${r.roi}%</td><td>${zone(r.rank)}</td></tr>`;

      // Badges
      const iconStar = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="12,2 15,9 22,9.5 17,15 18.5,22 12,18 5.5,22 7,15 2,9.5 9,9"/></svg>';
      const badgesHtml = bd.map(b => `<div class="badge-tile ${b.unlocked ? 'on' : ''}"><div class="b-ic">${iconStar}</div><div class="b-n">${b.name}</div><div class="b-d">${b.desc}</div></div>`).join("");

      return `
        ${seasonHero}
        ${myStatusCard}

        <h3 style="font-size:1.1rem;margin:0 0 12px;">Ladder de progression</h3>
        <div class="card" style="margin-bottom:18px;"><div class="lp">${ladder}</div><p class="muted" style="font-size:0.84rem;margin-top:10px;">Bronze → Argent → Or → Champion → <b style="color:var(--orange)">Élite (financé)</b>. Chaque mois, top 15 % de ta poule monte, bottom 15 % descend. Les vainqueurs des poules Champion décrochent leur compte financé.</p></div>

        <h3 style="font-size:1.1rem;margin:24px 0 12px;">Univers en cours · ${SF.escapeHtml(season.theme)}</h3>
        <div class="grid grid-2" style="gap:14px;">
          ${soireeCard}
          ${survivorCard}
          ${cupCard}
          ${mastersCard}
        </div>

        <h3 style="font-size:1.1rem;margin:28px 0 12px;">Mes duels</h3>
        ${duelsHtml}

        <h3 style="font-size:1.1rem;margin:28px 0 12px;">Classement de ma poule · Saison ${SF.escapeHtml(season.monthLabel)}</h3>
        <div class="card" style="padding:6px 0;overflow-x:auto;">
          <table class="history" style="min-width:520px;"><thead><tr><th>#</th><th>Joueur</th><th>Paris</th><th>ROI</th><th>Statut</th></tr></thead><tbody>${display.map(row).join("")}</tbody></table>
        </div>
        <p class="muted" style="font-size:0.82rem;margin-top:10px;">Top 15 % monte, bottom 15 % descend. <a href="reglement.html" style="color:var(--orange)">Voir le règlement</a>. Adversaires de démonstration.</p>

        <h3 style="font-size:1.1rem;margin:28px 0 12px;">Mes badges</h3>
        <div class="badges-grid">${badgesHtml}</div>

        <h3 style="font-size:1.1rem;margin:28px 0 12px;">Calendrier de la saison ${SF.escapeHtml(season.monthLabelShort)}</h3>
        <div class="card">
          <div class="cal-row"><div class="wk">Semaines 1-3</div><div class="ev">Tournois hebdomadaires + soirées thématiques ${SF.escapeHtml(season.tag.toLowerCase())}.</div></div>
          <div class="cal-row"><div class="wk">Semaine 4</div><div class="ev">« Promotion Week » : montées et descentes de division en direct.</div></div>
          <div class="cal-row"><div class="wk">${season.end.toLocaleDateString("fr-FR", { day: "numeric", month: "long" })}</div><div class="ev">Grande finale : les nouveaux Élite décrochent leur compte financé.</div></div>
        </div>`;
    }

    /* ---------- Récompenses ---------- */
    function viewRewards() {
      const r = SF.getRewards(), ref = SF.referralCode();
      return `
        <div class="grid grid-2" style="gap:18px;">
          <div class="card"><div class="k" style="font-size:0.74rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted)">Crédits Spovibe</div><div style="font-size:2rem;font-weight:900;color:var(--orange);margin-top:6px;">${r.credits} €</div><p class="muted" style="font-size:0.88rem;margin-top:4px;">Déductibles de tes prochains challenges.</p></div>
          <div class="card"><div class="k" style="font-size:0.74rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted)">Code de parrainage</div><div style="margin-top:12px;"><span class="code-pill">${ref} <button class="btn btn-ghost btn-sm" onclick="copyTxt('${ref}')">Copier</button></span></div><p class="muted" style="font-size:0.88rem;margin-top:10px;">Partage-le : ton filleul et toi gagnez des crédits.</p></div>
        </div>
        <h3 style="margin:26px 0 12px;">Mes codes de réduction</h3>
        <div class="card" style="padding:6px 0;overflow-x:auto;"><table class="history"><thead><tr><th>Code</th><th>Avantage</th><th>Validité</th><th></th></tr></thead><tbody>${r.codes.length ? r.codes.map(c => `<tr><td><b>${c.code}</b></td><td>${c.label}</td><td class="muted">${c.expiry || "—"}</td><td><button class="btn btn-ghost btn-sm" onclick="copyTxt('${c.code}')">Copier</button></td></tr>`).join("") : '<tr><td colspan="4" class="empty">Aucun code pour le moment.</td></tr>'}</tbody></table></div>`;
    }

    /* ---------- Communauté ---------- */
    function viewCommunity() {
      const c = SF.myCommunity();
      if (!c) return `
        <div class="card lock-box">
          <div style="margin:0 auto 16px;width:46px;height:46px;border-radius:12px;display:grid;place-items:center;background:var(--orange-soft);color:var(--orange);border:1px solid var(--orange-line);"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
          <h3 style="margin-bottom:8px;">Espace réservé aux communautés</h3>
          <p class="muted" style="max-width:480px;margin:0 auto 24px;">La discussion est accessible uniquement aux créateurs de contenu et aux membres de leur communauté. Rejoins-en une avec un code, ou crée la tienne.</p>
          <div class="alert error" id="cAlert" style="max-width:560px;margin:0 auto 16px;"></div>
          <div class="grid grid-2" style="gap:16px;text-align:left;max-width:560px;margin:0 auto;">
            <div><div class="field"><label>Rejoindre via un code</label><input class="input" id="joinCode" placeholder="C-XXXXX"></div><button class="btn btn-ghost btn-block" onclick="doJoin()">Rejoindre</button></div>
            <div><div class="field"><label>Créer ma communauté</label><input class="input" id="commName" placeholder="Nom de ta communauté"></div><button class="btn btn-primary btn-block" onclick="doCreate()">Créer</button></div>
          </div>
        </div>`;
      const creator = SF.isCreator();
      const list = c.messages.map(m => `<div class="msg"><div><span class="a">${SF.escapeHtml(m.author)}</span><span class="x">${SF.fmtDate(m.at)}</span></div><p>${SF.escapeHtml(m.text)}</p></div>`).join("");
      return `
        <div class="card" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:18px;">
          <div><div style="font-weight:800;font-size:1.15rem;">${SF.escapeHtml(c.name)}</div><div class="muted" style="font-size:0.86rem;">${c.members.length + 1} membre(s) · ${creator ? 'Tu es le créateur' : 'Membre'}</div></div>
          <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">${creator ? `<span class="code-pill">${c.code} <button class="btn btn-ghost btn-sm" onclick="copyTxt('${c.code}')">Copier</button></span>` : ''}<button class="btn btn-ghost btn-sm" onclick="doLeave()">${creator ? 'Fermer la communauté' : 'Quitter'}</button></div>
        </div>
        <div class="card">
          <h3 style="margin-bottom:14px;">Discussion</h3>
          <div class="chat">${list}</div>
          <form onsubmit="return doPost(event)" style="display:flex;gap:10px;margin-top:16px;"><input class="input" id="msgInput" placeholder="Écris un message…" required><button class="btn btn-primary" type="submit">Envoyer</button></form>
        </div>`;
    }

    /* ---------- Paris sportifs ---------- */
    function viewBetting() {
      const acc = SF.sportsAccount();
      const isActive = !!(acc && (acc.status === "active" || acc.status === "funded"));
      const locked = !isActive;

      let header = "";
      if (locked) {
        const reason = !acc
          ? "Voici les matchs sur lesquels tu pourras parier avec ta bankroll Spovibe. Football, tennis, basket, hippique — démontre ton edge et passe financé."
          : (acc.status === "passed"
              ? "Ton évaluation Sports est réussie ! Active ton compte financé pour reprendre."
              : "Ce challenge Sports est terminé. Relance-en un nouveau pour reprendre.");
        const ctaLabel = !acc ? "Démarrer un challenge Sports" : (acc.status === "passed" ? "Activer mon compte financé" : "Relancer un challenge");
        const ctaHref = !acc ? "challenges.html?v=sports" : (acc.status === "passed" ? "#challenges" : "challenges.html?v=sports");
        header = `<div class="pm-slip" style="margin-bottom:18px;background:linear-gradient(135deg, var(--orange) 0%, var(--orange-2) 100%);border-color:transparent;color:#fff;">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;">
            <div style="flex:1;min-width:220px;">
              <div style="font-size:0.7rem;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.85);font-weight:700;">${!acc ? "Prévisualisation" : "Compte inactif"}</div>
              <div style="font-weight:800;font-size:1.2rem;color:#fff;margin-top:4px;">${!acc ? "Cotes en direct, marchés en direct" : "Cotes en lecture seule"}</div>
              <p style="color:rgba(255,255,255,0.92);font-size:0.94rem;margin-top:6px;line-height:1.5;">${reason}</p>
            </div>
            <a class="btn" style="background:#fff;color:var(--orange);font-weight:800;border-color:transparent;" href="${ctaHref}">${ctaLabel}</a>
          </div>
        </div>`;
      }

      let stats, slipHtml = "", pendHtml = "";
      if (isActive) {
        const avail = SF.availableBalance(acc), maxStake = acc.capital * acc.tier.maxStakePct / 100, pend = (acc.pending || []).filter(p => p.kind !== "prediction");
        stats = `<div class="kpi-grid" style="grid-template-columns:repeat(3,1fr);">
          <div class="kpi"><div class="k">Solde disponible</div><div class="v">${SF.fmt2(avail)}</div><div class="sub">sur ${SF.fmt2(acc.balance)}</div></div>
          <div class="kpi"><div class="k">Mise par pari</div><div class="v">${acc.tier.minStakePct ? SF.fmt(acc.capital * acc.tier.minStakePct / 100) + " – " : ""}${SF.fmt(maxStake)}</div><div class="sub">${acc.tier.minStakePct ? acc.tier.minStakePct + "% – " : ""}${acc.tier.maxStakePct}% du capital</div></div>
          <div class="kpi"><div class="k">Paris en cours</div><div class="v">${pend.length}</div><div class="sub">${pend.length ? 'à régler' : 'aucun'}</div></div>
        </div>`;
        if (slip) slipHtml = `<div class="slip">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><b>Ton pari</b><button class="btn btn-ghost btn-sm" onclick="clearSlip()">Annuler</button></div>
          <div class="muted" style="font-size:0.86rem;">${SF.escapeHtml(slip.event)}</div>
          <div style="font-weight:700;margin:2px 0 12px;">${SF.escapeHtml(slip.pickName)} <span style="color:var(--orange)">@ ${slip.odds.toFixed(2)}</span></div>
          <div class="alert error" id="wAlert"></div>
          <div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;">
            <div class="field" style="margin:0;flex:1;min-width:150px;"><label>Mise (€) · ${acc.tier.minStakePct ? SF.fmt(acc.capital * acc.tier.minStakePct / 100) + " – " : "max "}${SF.fmt(maxStake)}</label><input class="input" id="wStake" type="number" min="1" step="1" value="${slip.stake || ''}" oninput="onStake(this.value)" placeholder="ex. ${Math.round(maxStake)}"></div>
            <button class="btn btn-primary" onclick="confirmWager()">Placer le pari</button>
          </div>
          <div class="muted" style="font-size:0.85rem;margin-top:10px;">Gain potentiel : <b id="wPayout" style="color:var(--text)">${SF.fmt2(slip.odds * (slip.stake || 0))}</b></div>
        </div>`;
        if (pend.length) pendHtml = `<div class="card" style="margin-bottom:22px;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><h3>Paris en cours (${pend.length})</h3><button class="btn btn-primary btn-sm" onclick="doSettle('sports')">Simuler les résultats</button></div>${pend.map(p => `<div class="pending-row"><div><b>${SF.escapeHtml(p.event)}</b><div class="muted" style="font-size:0.8rem;">${SF.escapeHtml(p.pickName)} @ ${p.odds.toFixed(2)}</div></div><div style="text-align:right;"><div>${SF.fmt2(p.stake)}</div><div class="muted" style="font-size:0.8rem;">gain ${SF.fmt2(p.stake * p.odds)}</div></div></div>`).join("")}</div>`;
      } else {
        // Teaser stats
        stats = `<div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);">
          <div class="kpi"><div class="k">Bankroll à viser</div><div class="v" style="color:var(--orange)">5k → 100k €</div><div class="sub">5 paliers HT 97 → 1 697 €</div></div>
          <div class="kpi"><div class="k">Objectif</div><div class="v">+35 % / 30 j</div><div class="sub">Compte financé à la clé</div></div>
          <div class="kpi"><div class="k">Mise par pari</div><div class="v">2 % – 5 %</div><div class="sub">du capital</div></div>
          <div class="kpi"><div class="k">Partage des gains</div><div class="v" style="color:var(--green)">85 %</div><div class="sub">Retrait sous 24 h</div></div>
        </div>`;
      }

      const onPick = (fid, k) => locked ? `location.href='challenges.html?v=sports'` : `pickSel('${fid}','${k}')`;

      // ===== Vue par défaut : GRILLE DE CATÉGORIES DE SPORT =====
      if (!bettingSport) {
        const sportSvg = {
          "Football": '<svg viewBox="0 0 100 100" fill="currentColor"><circle cx="50" cy="50" r="44" fill="none" stroke="currentColor" stroke-width="3"/><path d="M50 28l16 12-6 19h-20l-6-19z" fill="currentColor"/><path d="M50 28L34 13M50 28l16-15M66 40l20 5M40 59l-18 8M60 59l18 8M50 80V96" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round"/></svg>',
          "Tennis": '<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><circle cx="36" cy="36" r="24"/><path d="M14 60l-6 12 14 14 12-6"/><path d="M18 30c8 4 18 14 22 22"/><path d="M54 18c-4 8-14 18-22 22"/></svg>',

          "E-sport": '<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"><rect x="14" y="34" width="72" height="40" rx="14"/><circle cx="34" cy="54" r="4" fill="currentColor"/><circle cx="66" cy="54" r="4" fill="currentColor"/><path d="M22 50v8M22 54h8" stroke-linecap="round"/><path d="M70 54h8M74 50v8" stroke-linecap="round"/></svg>',
          "Rugby": '<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><ellipse cx="50" cy="50" rx="32" ry="20" transform="rotate(-30 50 50)"/><path d="M36 36l28 28M40 44l20 12M44 36l20 12"/></svg>',
          "Hippique": '<svg viewBox="0 0 100 100" fill="currentColor"><path d="M30 78c0-12 6-22 14-28-4-6-2-14 6-16 4-1 6 1 6 4l-2 6 14-6c8-4 16 0 16 8 0 6-6 10-10 8-2-1-2-2-2-4l-6 4-2 8 8 18-12-2-8-12-6 4v8h-16z"/></svg>',
          "MMA": '<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"><path d="M30 30c-6 0-10 4-10 10v22c0 8 6 14 14 14h26c8 0 14-6 14-14V40c0-6-4-10-10-10h-4M44 30v18M56 30v18M44 30c0-4 2-6 6-6s6 2 6 6"/></svg>',
          "Hockey": '<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 80L70 30l8 8L28 88z"/><rect x="22" y="76" width="12" height="14" rx="2" transform="rotate(-45 28 83)"/><ellipse cx="80" cy="78" rx="10" ry="4" fill="currentColor"/></svg>',
          "Volley": '<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="3"><circle cx="50" cy="50" r="40"/><path d="M50 10c0 14-14 40 0 80M50 10c14 14 28 40 0 80M10 50c14-14 40-28 80 0M10 50c14 14 40 28 80 0"/></svg>',
        };
        const cards = SF.SPORT_CATEGORIES.map(s => {
          const count = SF.FIXTURES.filter(f => f.sport === s.id).length;
          const icon = sportSvg[s.id] || '';
          if (s.soon) {
            return `<div class="sport-card soon" title="Disponible bientôt">
              <span class="sport-count">Bientôt</span>
              <div>
                <h3>${SF.escapeHtml(s.id)}</h3>
                <div class="sport-desc">${SF.escapeHtml(s.desc)}</div>
              </div>
              <span class="sport-cta">Bientôt disponible</span>
              <div class="sport-svg">${icon}</div>
            </div>`;
          }
          return `<div class="sport-card" onclick="goSport('${s.id}')">
            <span class="sport-count">${count} match${count > 1 ? "s" : ""}</span>
            <div>
              <h3>${SF.escapeHtml(s.id)}</h3>
              <div class="sport-desc">${SF.escapeHtml(s.desc)}</div>
            </div>
            <span class="sport-cta">Tous les matchs <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
            <div class="sport-svg">${icon}</div>
          </div>`;
        }).join("");
        const footNoteGrid = locked
          ? `<p class="muted" style="font-size:0.84rem;margin-top:18px;">Cliquez sur un sport pour voir les matchs. <a href="challenges.html?v=sports" style="color:var(--orange);font-weight:700;">Lance ton challenge</a> pour parier.</p>`
          : `<p class="muted" style="font-size:0.84rem;margin-top:18px;">Cliquez sur un sport pour voir les matchs et placer un pari.</p>`;
        return header + stats + slipHtml + pendHtml + `<h2 style="font-size:1.2rem;margin:8px 0 4px;">Choisis ta discipline</h2>` + `<div class="sport-grid">${cards}</div>` + footNoteGrid;
      }

      // ===== Vue détaillée : MATCHS DU SPORT SÉLECTIONNÉ =====
      const sportFixtures = SF.FIXTURES.filter(f => f.sport === bettingSport);
      const fixturesHtml = `<div class="card" style="margin-bottom:14px;">${sportFixtures.map(f => `
        <div class="fixture">
          <div><div class="meta">${f.league} · ${f.time}</div><div class="teams">${f.home} <span class="muted">vs</span> ${f.away}</div></div>
          <div class="odds">${f.sels.map(s => `<button class="odds-btn ${(!locked && slip && slip.fixtureId === f.id && slip.pick === s.k) ? 'sel' : ''}" onclick="${onPick(f.id, s.k)}" ${locked ? 'title="Lance ton challenge Sports pour parier"' : ''}><span class="lbl">${s.k === 'X' ? 'Nul' : s.k}</span><span class="val">${s.o.toFixed(2)}</span></button>`).join("")}</div>
        </div>`).join("")}</div>`;
      const footNote = locked
        ? `<p class="muted" style="font-size:0.84rem;">Matchs et cotes de démonstration. <a href="challenges.html?v=sports" style="color:var(--orange);font-weight:700;">Lance ton challenge</a> pour parier avec une bankroll jusqu'à 100 000 €.</p>`
        : `<p class="muted" style="font-size:0.84rem;">Données et résultats de démonstration. « Simuler les résultats » règle tes paris en cours (issue probabiliste pondérée par la cote).</p>`;
      return header + stats + slipHtml + pendHtml +
        `<button class="sport-back" onclick="backSport()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>Toutes les disciplines</button>` +
        `<h2 style="font-size:1.2rem;margin:4px 0 14px;">${SF.escapeHtml(bettingSport)} · matchs à venir</h2>` + fixturesHtml + footNote;
    }

    /* ---------- Profil & paiements ---------- */
    function viewProfile() {
      const u = SF.currentUser(), pays = SF.payments();
      const fundedAccs = SF.activeAccounts().filter(a => a.phase === "funded");
      let fundedCard = '<div class="card"><h3 style="margin-bottom:8px;">Comptes financés</h3><p class="muted" style="font-size:0.92rem;">Aucun compte financé actif. Réussis une évaluation pour débloquer les retraits.</p></div>';
      if (fundedAccs.length) {
        fundedCard = `<div class="card"><h3 style="margin-bottom:12px;">Comptes financés (${fundedAccs.length})</h3>` +
          fundedAccs.map(acc => { const s = SF.stats(acc); const v = acc.vertical || acc.tier.vertical || "sports";
            return `<div style="border-top:1px solid var(--border);padding-top:12px;margin-top:12px;${fundedAccs.indexOf(acc) === 0 ? 'border:0;padding:0;margin:0;' : ''}">
              <div style="font-weight:800;margin-bottom:8px;">${v === "predictions" ? ICN_CHART : ICN_SPORT} ${vertLabel(v)} · ${acc.tier.name}</div>
              <div class="rule-row"><span class="muted">Part retirable (${acc.tier.split}%)</span><b style="color:var(--orange)">${SF.fmt2(s.withdrawable)}</b></div>
              <div class="rule-row"><span class="muted">Déjà retiré</span><b>${SF.fmt2(acc.withdrawn || 0)}</b></div>
              <button class="btn btn-primary btn-block" style="margin-top:10px;" onclick="doWithdraw('${v}')" ${s.withdrawable <= 0 ? 'disabled' : ''}>Demander un retrait</button>
            </div>`;
          }).join("") + `</div>`;
      }
      return `
        <div class="grid grid-2" style="gap:18px;align-items:start;">
          <div class="card">
            <h3 style="margin-bottom:14px;">Profil</h3>
            <div class="alert ok" id="pOk"></div><div class="alert error" id="pErr"></div>
            <div class="field"><label>Nom complet</label><input class="input" id="pName" value="${SF.escapeHtml(u.name)}"></div>
            <div class="field"><label>E-mail</label><input class="input" value="${SF.escapeHtml(u.email)}" disabled></div>
            <button class="btn btn-primary" onclick="saveProfile()">Enregistrer</button>
          </div>
          ${fundedCard}
        </div>
        <h3 style="margin:26px 0 12px;">Historique de paiement</h3>
        <div class="card" style="padding:6px 0;overflow-x:auto;"><table class="history"><thead><tr><th>Date</th><th>Type</th><th>Détail</th><th>Montant</th><th></th></tr></thead><tbody>${pays.length ? pays.map((p, i) => `<tr><td class="muted">${SF.fmtDate(p.at)}</td><td>${p.type}</td><td>${SF.escapeHtml(p.label)}</td><td class="${p.dir === 'in' ? 'pos' : ''}">${p.dir === 'in' ? '+' : '−'}${SF.fmt2(p.amount)}${p.dir === 'out' ? ' HT' : ''}</td><td>${p.type === 'Retrait' ? `<button class="cert-link-row" onclick="openPayoutCert(${p.at})">Certificat</button>` : ''}</td></tr>`).join("") : '<tr><td colspan="5" class="empty">Aucun paiement.</td></tr>'}</tbody></table></div>`;
    }

    /* ---------- Paramètres ---------- */
    function viewSettings() {
      const p = SF.prefs();
      return `
        <div class="card" style="margin-bottom:18px;">
          <h3 style="margin-bottom:14px;">Mot de passe</h3>
          <div class="alert ok" id="sOk"></div><div class="alert error" id="sErr"></div>
          <div class="bet-form"><div class="field"><label>Mot de passe actuel</label><input class="input" id="oldP" type="password"></div><div class="field"><label>Nouveau mot de passe</label><input class="input" id="newP" type="password"></div></div>
          <button class="btn btn-primary" onclick="savePass()">Changer le mot de passe</button>
        </div>
        <div class="card" style="margin-bottom:18px;">
          <h3 style="margin-bottom:8px;">Préférences</h3>
          <label class="rule-row" style="cursor:pointer;"><span>Notifications de tournoi</span><input type="checkbox" id="prefNotifs" ${p.notifs ? 'checked' : ''} onchange="savePref()"></label>
          <label class="rule-row" style="cursor:pointer;"><span>Newsletter Spovibe</span><input type="checkbox" id="prefNews" ${p.newsletter ? 'checked' : ''} onchange="savePref()"></label>
        </div>
        <div class="card" style="border-color:rgba(229,72,77,0.3);">
          <h3 style="margin-bottom:8px;">Zone sensible</h3>
          <p class="muted" style="font-size:0.9rem;margin-bottom:14px;">Réinitialiser efface la progression du challenge choisi.</p>
          ${SF.sportsAccount() ? `<button class="btn btn-ghost" onclick="doReset('sports')" style="margin:0 8px 8px 0;">Réinitialiser Sports</button>` : ''}
          ${SF.predictionsAccount() ? `<button class="btn btn-ghost" onclick="doReset('predictions')" style="margin:0 8px 8px 0;">Réinitialiser Prédictions</button>` : ''}
          <button class="btn btn-ghost" onclick="(async()=>{await SF.logout();location.href='index.html';})();">Déconnexion</button>
        </div>`;
    }

    /* ---------- Mes certificats ---------- */
    function viewCertificates() {
      const accs = SF.activeAccounts();
      const eligible = accs.filter(a => a.status === "passed" || a.phase === "funded");
      const payouts = SF.payments().filter(p => p.type === "Retrait");

      if (!eligible.length && !payouts.length) {
        return `<div class="card center" style="padding:46px;">
          <div style="width:60px;height:60px;border-radius:50%;background:var(--orange-soft);color:var(--orange);display:grid;place-items:center;margin:0 auto 14px;">${I.cert}</div>
          <h3 style="margin-bottom:10px;">Pas encore de certificat</h3>
          <p class="muted" style="max-width:480px;margin:0 auto;">Tes certificats apparaîtront ici dès ta première évaluation validée ou ton premier retrait. Tu pourras les télécharger en PNG, PDF ou SVG pour les partager.</p>
        </div>`;
      }

      const achievementCards = eligible.map(a => {
        const v = a.vertical || a.tier.vertical || "sports";
        const dateLabel = a.fundedAt ? `Compte activé ${dateShort(a.fundedAt)}` : `Évaluation réussie`;
        return `<div class="cert-card">
          <div class="cert-card-thumb" style="background:linear-gradient(135deg,var(--orange),var(--orange-2));">
            <div style="width:54px;height:54px;color:#fff;">${I.cert}</div>
          </div>
          <div class="cert-card-body">
            <div style="font-size:0.68rem;text-transform:uppercase;letter-spacing:0.14em;font-weight:700;color:var(--orange);margin-bottom:6px;">Réussite ${vertLabel(v)}</div>
            <h4 style="font-size:1rem;margin-bottom:4px;">${SF.escapeHtml(a.tier.name)} · ${SF.fmt(a.capital)}</h4>
            <div class="muted" style="font-size:0.84rem;margin-bottom:14px;">${dateLabel}</div>
            <button class="btn btn-primary btn-block btn-sm" onclick="openAchievementCert('${v}')">Voir &amp; télécharger</button>
          </div>
        </div>`;
      }).join("");

      const payoutCards = payouts.map(p => `<div class="cert-card">
        <div class="cert-card-thumb" style="background:linear-gradient(135deg,#1FB573,#3DD68F);">
          <div style="width:54px;height:54px;color:#fff;">${I.wallet}</div>
        </div>
        <div class="cert-card-body">
          <div style="font-size:0.68rem;text-transform:uppercase;letter-spacing:0.14em;font-weight:700;color:var(--green);margin-bottom:6px;">Preuve de paiement</div>
          <h4 style="font-size:1rem;margin-bottom:4px;">${SF.fmt2(p.amount)}</h4>
          <div class="muted" style="font-size:0.84rem;margin-bottom:14px;">Payé le ${SF.fmtDate(p.at)}</div>
          <button class="btn btn-primary btn-block btn-sm" onclick="openPayoutCert(${p.at})">Voir &amp; télécharger</button>
        </div>
      </div>`).join("");

      const totalCerts = eligible.length + payouts.length;
      return `<div class="card" style="margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;">
        <div>
          <h3 style="margin-bottom:4px;">${totalCerts} certificat${totalCerts > 1 ? 's' : ''} disponibles</h3>
          <p class="muted" style="font-size:0.86rem;">Partage tes succès sur Twitter, LinkedIn ou Instagram. Chaque certificat a un numéro unique vérifiable.</p>
        </div>
        <span style="background:var(--orange-soft);color:var(--orange);padding:8px 14px;border-radius:99px;font-size:0.78rem;font-weight:700;">Format PNG · PDF · SVG</span>
      </div>
      ${eligible.length ? `<h3 style="margin:24px 0 12px;">Certificats de réussite (${eligible.length})</h3>
        <div class="cert-grid">${achievementCards}</div>` : ''}
      ${payouts.length ? `<h3 style="margin:32px 0 12px;">Preuves de paiement (${payouts.length})</h3>
        <div class="cert-grid">${payoutCards}</div>` : ''}`;
    }

    const VIEWS = { overview: viewOverview, challenges: viewChallenges, betting: viewBetting, predictions: viewPredictions, arena: viewArena, certificates: viewCertificates, rewards: viewRewards, community: viewCommunity, profile: viewProfile, settings: viewSettings };

    /* ---------- Routing & shell ---------- */
    function current() {
      // Strip la query string : "#challenges?v=predictions" → "challenges"
      const h = (location.hash || "#overview").slice(1).split("?")[0];
      return VIEWS[h] ? h : "overview";
    }
    function go(sec) { location.hash = sec; }
    function renderSidebar() {
      const u = SF.currentUser(), cur = current();
      const a = SF.arena(), div = a ? (SF.DIVS.find(d => d.id === a.division) || {}).name : "";
      document.getElementById("boWho").innerHTML = `<div class="nm">${SF.escapeHtml(u.name)}</div><div class="em">${SF.escapeHtml(u.email)}</div>${div ? `<div class="rank-chip">★ ${div}</div>` : ''}`;
      document.getElementById("boNav").innerHTML = SECTIONS.map(item => {
        const [id, label, icon] = item;
        if (id === "__sect") return `<div class="bo-sect">${label}</div>`;
        return `<button class="bo-link ${id === cur ? 'active' : ''}" onclick="go('${id}')">${icon}<span>${label}</span></button>`;
      }).join("");
    }
    function render() {
      const cur = current(), tt = TITLES[cur];
      const head = cur === "overview" ? "" : `<div class="dash-h"><div><h1>${tt[0]}</h1><div class="sub">${tt[1]}</div></div><div class="actions"><button class="pill-sel" onclick="render()">Actualiser</button></div></div>`;
      document.getElementById("view").innerHTML = head + VIEWS[cur]();
      renderSidebar();
      window.scrollTo({ top: 0, behavior: "instant" });
    }
    window.go = go;
    window.addEventListener("hashchange", render);

    /* ---------- Actions ---------- */
    // Arena — tournois & duels
    window.doToggleSoiree = () => { SF.toggleSoiree(); render(); };
    window.doSurvivorEnter = () => { SF.survivorEnter(); render(); };
    window.doSurvivorPick = () => { const r = SF.survivorPick(); if (r.error) { alert(r.error); return; } alert(r.survived ? `Survécu ! Tu passes au round ${r.round}.` : `Éliminé au round ${r.round}. Le prochain Survivor démarre bientôt.`); render(); };
    window.doSurvivorRestart = () => { SF.survivorRestart(); render(); };
    window.doCreateDuel = () => { const opp = document.getElementById("duOpp").value; const al = document.getElementById("duAlert"); const r = SF.createDuel(opp); if (r.error) { al.textContent = r.error; al.classList.add("show"); return; } render(); };
    window.doSettleDuel = id => { const r = SF.settleDuel(id); if (r.error) { alert(r.error); return; } alert(r.win ? "Victoire !" : "Défaite — tu auras la prochaine."); render(); };
    window.doDeleteDuel = id => { SF.deleteDuel(id); render(); };

    let slip = null;
    let bettingSport = null;
    window.goSport = (s) => { bettingSport = s; render(); window.scrollTo({ top: 0, behavior: "instant" }); };
    window.backSport = () => { bettingSport = null; render(); window.scrollTo({ top: 0, behavior: "instant" }); };
    window.pickSel = (fid, pick) => { const f = SF.FIXTURES.find(x => x.id === fid); const s = f.sels.find(x => x.k === pick); slip = { fixtureId: fid, pick, event: f.home + " – " + f.away, pickName: s.n, odds: s.o, stake: null }; render(); };
    window.clearSlip = () => { slip = null; render(); };
    window.onStake = v => { if (slip) { slip.stake = v === "" ? null : Number(v); const el = document.getElementById("wPayout"); if (el) el.textContent = SF.fmt2((slip.odds || 0) * (slip.stake || 0)); } };
    window.confirmWager = () => { const acc = SF.sportsAccount(); const al = document.getElementById("wAlert"); const r = SF.placeWager(acc, { fixtureId: slip.fixtureId, pick: slip.pick, stake: Number(document.getElementById("wStake").value) }); if (r.error) { al.textContent = r.error; al.classList.add("show"); return; } slip = null; render(); };
    // doSettle(vertical) — règle les paris/positions d'un vertical donné
    window.doSettle = (vertical) => {
      vertical = vertical || "sports";
      const acc = SF.getAccount(vertical);
      if (!acc) { alert("Aucun compte " + (vertical === "predictions" ? "Prédictions" : "Sports") + " actif."); return; }
      const r = SF.settleAll(acc); if (r.error) { alert(r.error); return; }
      const won = r.results.filter(x => x.win).length; const net = r.results.reduce((s, x) => s + x.pnl, 0);
      const unit = vertical === "predictions" ? "position(s)" : "pari(s)";
      alert(`${r.results.length} ${unit} réglé(s) : ${won} gagné(s). Résultat net : ${(net >= 0 ? '+' : '')}${SF.fmt2(net)}.`); render();
    };
    // Marchés prédictifs
    window.pmPickSide = (id, side) => {
      const m = pmMarkets.find(x => x.id === id); if (!m) return;
      const label = side === "YES" ? (m.yesLabel || "Oui") : (m.noLabel || "Non");
      pmSlip = { marketId: m.id, side, price: side === "YES" ? m.yesPrice : m.noPrice, question: m.question, label };
      render();
    };
    window.pmClear = () => { pmSlip = null; render(); };
    window.pmConfirm = async () => {
      const al = document.getElementById("pmAlert"); al.classList.remove("show");
      const stake = Number(document.getElementById("pmStake").value);
      if (!stake || stake <= 0) { al.textContent = "Indique une mise."; al.classList.add("show"); return; }
      const r = await SpovibePolymarket.placePosition({
        marketId: pmSlip.marketId,
        side: pmSlip.side === "YES" ? "Yes" : "No",
        stake,
      });
      if (r.error) { al.textContent = r.error; al.classList.add("show"); return; }
      pmSlip = null; render();
    };
    window.pmSetCat = cat => {
      pmCategory = cat;
      // Active l'auto-refresh 30s uniquement sur Crypto (pour les marchés live 5min)
      if (cat === "crypto") startCryptoAutoRefresh(); else stopCryptoAutoRefresh();
      render();
    };
    window.pmSetSearch = q => { pmSearch = q; render(); };
    window.pmSetSort = s => { pmSort = s; render(); };
    window.pmRefresh = () => { pmMarkets = null; pmError = null; SpovibePolymarket.clearCache(); loadPolymarket(true); };
    let betResult = "win";
    window.setResult = r => { betResult = r; document.getElementById("segWin").classList.toggle("active", r === "win"); document.getElementById("segLose").classList.toggle("active", r === "lose"); };
    window.onBet = e => { e.preventDefault(); const acc = SF.sportsAccount(); const al = document.getElementById("betAlert"); const res = SF.placeBet(acc, { event: document.getElementById("bEvent").value, stake: document.getElementById("bStake").value, odds: document.getElementById("bOdds").value, result: betResult }); if (res.error) { al.textContent = res.error; al.classList.add("show"); return false; } betResult = "win"; render(); return false; };
    window.doClaim = (vertical) => { const acc = SF.getAccount(vertical || "sports"); if (!acc) { alert("Aucun compte actif sur ce vertical."); return; } const r = SF.claimFunded(acc); if (r.error) { alert(r.error); return; } render(); };
    window.doWithdraw = (vertical) => { const acc = SF.getAccount(vertical || "sports"); if (!acc) { alert("Aucun compte actif sur ce vertical."); return; } const r = SF.withdraw(acc); if (r.error) { alert(r.error); return; } alert("Retrait de " + SF.fmt2(r.payout) + " demandé. Traitement sous 24 h (démo)."); render(); };
    window.doReset = (vertical) => {
      const accs = SF.activeAccounts();
      if (!accs.length) return;
      let target = vertical;
      if (!target && accs.length === 1) target = accs[0].vertical;
      if (!target) {
        target = prompt("Quel challenge réinitialiser ? Tape 'sports' ou 'predictions'.");
        if (!target) return;
        target = target.toLowerCase().trim();
      }
      if (target !== "sports" && target !== "predictions") { alert("Vertical invalide."); return; }
      if (confirm(`Réinitialiser ton challenge ${target === "predictions" ? "Prédictions" : "Sports"} ? La progression sera effacée.`)) { SF.resetAccount(target); render(); }
    };
    window.copyTxt = t => { try { navigator.clipboard.writeText(t); } catch (e) {} };
    window.doJoin = () => { const r = SF.joinCommunity(document.getElementById("joinCode").value); if (r.error) { const a = document.getElementById("cAlert"); a.textContent = r.error; a.classList.add("show"); return; } render(); };
    window.doCreate = () => { const r = SF.createCommunity(document.getElementById("commName").value); if (r.error) { const a = document.getElementById("cAlert"); a.textContent = r.error; a.classList.add("show"); return; } render(); };
    window.doLeave = () => { if (confirm("Quitter cette communauté ?")) { SF.leaveCommunity(); render(); } };
    window.doPost = e => { e.preventDefault(); const r = SF.postMessage(document.getElementById("msgInput").value); if (!r.error) render(); return false; };
    window.saveProfile = () => { const r = SF.updateProfile(document.getElementById("pName").value); const ok = document.getElementById("pOk"), er = document.getElementById("pErr"); ok.classList.remove("show"); er.classList.remove("show"); if (r.error) { er.textContent = r.error; er.classList.add("show"); return; } ok.textContent = "Profil mis à jour."; ok.classList.add("show"); renderSidebar(); };
    window.savePass = () => { const r = SF.changePassword(document.getElementById("oldP").value, document.getElementById("newP").value); const ok = document.getElementById("sOk"), er = document.getElementById("sErr"); ok.classList.remove("show"); er.classList.remove("show"); if (r.error) { er.textContent = r.error; er.classList.add("show"); return; } ok.textContent = "Mot de passe mis à jour."; ok.classList.add("show"); document.getElementById("oldP").value = ""; document.getElementById("newP").value = ""; };
    window.savePref = () => { SF.savePrefs({ notifs: document.getElementById("prefNotifs").checked, newsletter: document.getElementById("prefNews").checked }); };

    /* ---------- Certificats ---------- */
    window.openAchievementCert = (vertical) => {
      const acc = SF.getAccount(vertical);
      const u = SF.currentUser();
      if (!acc || !u) { alert("Compte introuvable."); return; }
      if (!window.SpovibeCert) { alert("Module certificat encore en chargement, réessaie dans une seconde."); return; }
      SpovibeCert.showAchievement(u, acc);
    };
    window.openPayoutCert = (at) => {
      const u = SF.currentUser(); if (!u) return;
      if (!window.SpovibeCert) { alert("Module certificat encore en chargement, réessaie dans une seconde."); return; }
      const pays = SF.payments();
      const p = pays.find(x => x.at === at);
      if (!p) { alert("Paiement introuvable."); return; }
      // Contexte : on cherche le compte financé correspondant pour enrichir
      const accs = SF.activeAccounts();
      const acc = accs.find(a => a.phase === "funded") || accs[0] || null;
      const ctx = acc ? {
        tierName: acc.tier.name, tierCapital: acc.tier.capital,
        vertical: acc.vertical || (acc.tier && acc.tier.vertical) || "sports",
        method: "USDC",
        totalPaid: pays.filter(x => x.type === "Retrait" && x.at <= at).reduce((sum, x) => sum + x.amount, 0),
      } : { totalPaid: p.amount };
      SpovibeCert.showPayout(u, p, ctx);
    };

    // Boot async : on attend l'hydratation Supabase avant de render,
    // sinon on afficherait un compte vide avant que les données arrivent.
    (async () => {
      const view = document.getElementById("view");
      view.innerHTML = '<div style="padding:60px 20px;text-align:center;color:var(--ink-2);"><div style="width:42px;height:42px;border:3px solid var(--lavande);border-top-color:transparent;border-radius:50%;margin:0 auto 18px;animation:sf-spin 0.8s linear infinite;"></div><div>Chargement de vos données…</div></div><style>@keyframes sf-spin{to{transform:rotate(360deg)}}</style>';
      // Attendre que Supabase ait fini son init (token exchange + session)
      // Sinon, après un clic sur un mail de confirmation, currentUser() retourne
      // null et on raterait l'auto-activation du challenge.
      if (window.SpovibeAuth && SpovibeAuth.ready) {
        try { await SpovibeAuth.ready(); } catch (e) { console.warn(e); }
      }
      if (!SF.currentUser()) { location.href = "login.html"; return; }
      try { await SF.dataReady(); } catch (e) { console.warn(e); }
      // Un admin n'a rien à faire ici → redirection vers la console admin
      if (SF.isAdmin()) { location.replace("admin.html"); return; }
      // Auto-démarrage de challenge si ?activate=tierId est dans l'URL
      // (cas du signup-paiement unifié après confirmation e-mail)
      const params = new URLSearchParams(location.search);
      const activateTier = params.get("activate");
      if (activateTier && SF.tierById(activateTier)) {
        view.innerHTML = '<div style="padding:60px 20px;text-align:center;color:var(--ink-2);"><div style="width:42px;height:42px;border:3px solid var(--orange);border-top-color:transparent;border-radius:50%;margin:0 auto 18px;animation:sf-spin 0.8s linear infinite;"></div><div>Activation de votre challenge…</div></div>';
        const tier = SF.tierById(activateTier);
        const existing = SF.getAccount(tier.vertical);
        if (!existing || (existing.status !== "active" && existing.status !== "funded" && existing.status !== "passed")) {
          try { await SF.startChallenge(activateTier); } catch (e) { console.warn(e); }
        }
        // Nettoie le param de l'URL sans recharger
        history.replaceState(null, "", "espace.html");
      }
      render();
    })();
  </script>
</body>
</html>
