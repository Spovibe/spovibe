            <div>
              <h4 style="margin:0 0 8px;">Revenue par palier</h4>
              ${revByTierRows.length ? `<table class="history" style="width:100%;font-size:0.86rem;"><thead><tr><th>Palier</th><th>Revenue</th><th>%</th></tr></thead><tbody>${revByTierRows.map(r => `<tr><td><b>${SF.escapeHtml(r[0])}</b></td><td>${r[1]}</td><td class="muted">${r[2]}</td></tr>`).join("")}</tbody></table>` : '<p class="muted">Aucun revenue.</p>'}
            </div>
            <div>
              <h4 style="margin:0 0 8px;">Revenue par vertical</h4>
              <table class="history" style="width:100%;font-size:0.86rem;"><thead><tr><th>Vertical</th><th>Revenue</th><th>%</th></tr></thead><tbody>
                <tr><td><b>Sports</b></td><td>${fmt(revByVert.sports)}</td><td class="muted">${pct(revByVert.sports, revenue)}%</td></tr>
                <tr><td><b>Prédictions</b></td><td>${fmt(revByVert.predictions)}</td><td class="muted">${pct(revByVert.predictions, revenue)}%</td></tr>
              </tbody></table>
            </div>
          </div>
        </div>`;

      // ---------- 3. PASS RATE ----------
      const finished = accounts.filter(a => a.status === "passed" || a.status === "failed" || a.phase === "funded");
      const passedTotal = finished.filter(a => a.status === "passed" || a.phase === "funded").length;
      const failedTotal = finished.filter(a => a.status === "failed").length;
      const passRate = finished.length ? Math.round((passedTotal / finished.length) * 100) : 0;
      // Par palier
      const byTier = {};
      for (const a of finished) {
        const tn = (a.tier && a.tier.name) || "?";
        byTier[tn] = byTier[tn] || { name: tn, passed: 0, failed: 0 };
        if (a.status === "failed") byTier[tn].failed++;
        else byTier[tn].passed++;
      }
      const tierRows = Object.values(byTier).map(t => {
        const tot = t.passed + t.failed;
        return [t.name, t.passed, t.failed, tot, tot ? Math.round(t.passed / tot * 100) + "%" : "—"];
      });
      registerCsv("pass_by_tier", "spovibe_analytics_pass_rate_palier.csv", ["Palier", "Réussis", "Échoués", "Total terminés", "Pass rate"], tierRows);
      // Par vertical
      const byVert = { sports: { p: 0, f: 0 }, predictions: { p: 0, f: 0 } };
      for (const a of finished) {
        const v = a.vertical || (a.tier && a.tier.vertical) || "sports";
        if (a.status === "failed") byVert[v].f++; else byVert[v].p++;
      }
      // Durée moyenne d'une éval réussie / drawdown / profit %
      const passedFinished = finished.filter(a => a.status === "passed" || a.phase === "funded");
      const avgProfitPct = passedFinished.length ? Math.round(passedFinished.reduce((s, a) => s + ((a.balance - a.capital) / a.capital * 100), 0) / passedFinished.length) : 0;

      const passHtml = `
        <div class="card" style="padding:18px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;">
            <div><h3 style="margin:0;">Pass rate des évaluations</h3><p class="muted" style="margin:2px 0 0;font-size:0.84rem;">Sur ${finished.length} évaluation${finished.length > 1 ? 's' : ''} terminée${finished.length > 1 ? 's' : ''}</p></div>
            ${csvBtn("pass_by_tier", "Export par palier")}
          </div>
          <div class="adm-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px;">
            <div class="adm-stat featured"><div class="k">Pass rate global</div><div class="v">${passRate}%</div><div class="s">${passedTotal} / ${finished.length}</div></div>
            <div class="adm-stat"><div class="k">Réussis (passed + funded)</div><div class="v pos">${passedTotal}</div></div>
            <div class="adm-stat"><div class="k">Échoués</div><div class="v neg">${failedTotal}</div></div>
            <div class="adm-stat"><div class="k">Profit moyen sur réussis</div><div class="v pos">+${avgProfitPct}%</div><div class="s">% du capital initial</div></div>
          </div>
          <div class="grid grid-2" style="gap:16px;">
            <div>
              <h4 style="margin:0 0 8px;">Pass rate par palier</h4>
              ${tierRows.length ? `<table class="history" style="width:100%;font-size:0.86rem;"><thead><tr><th>Palier</th><th>Réussis</th><th>Échoués</th><th>Total</th><th>Pass rate</th></tr></thead><tbody>${tierRows.map(r => `<tr><td><b>${SF.escapeHtml(r[0])}</b></td><td class="pos">${r[1]}</td><td class="neg">${r[2]}</td><td>${r[3]}</td><td><b>${r[4]}</b></td></tr>`).join("")}</tbody></table>` : '<p class="muted">Aucune évaluation terminée.</p>'}
            </div>
            <div>
              <h4 style="margin:0 0 8px;">Pass rate par vertical</h4>
              <table class="history" style="width:100%;font-size:0.86rem;"><thead><tr><th>Vertical</th><th>Réussis</th><th>Échoués</th><th>Pass rate</th></tr></thead><tbody>
                ${["sports", "predictions"].map(v => { const r = byVert[v]; const tot = r.p + r.f; return `<tr><td><b>${v === 'sports' ? 'Sports' : 'Prédictions'}</b></td><td class="pos">${r.p}</td><td class="neg">${r.f}</td><td><b>${tot ? Math.round(r.p / tot * 100) + '%' : '—'}</b></td></tr>`; }).join("")}
              </tbody></table>
            </div>
          </div>
        </div>`;

      // ---------- 4. COHORTES PAR MOIS ----------
      const cohorts = {};
      for (const u of users) {
        const k = cohortKey(u.created);
        cohorts[k] = cohorts[k] || { users: 0, buyers: new Set(), passed: new Set(), funded: new Set(), revenue: 0, payouts: 0 };
        cohorts[k].users++;
      }
      const emailToCohort = {};
      for (const u of users) emailToCohort[u.email] = cohortKey(u.created);
      for (const a of accounts) {
        const k = emailToCohort[a._email];
        if (!k || !cohorts[k]) continue;
        cohorts[k].buyers.add(a._email);
        if (a.status === "passed" || a.phase === "funded") cohorts[k].passed.add(a._email);
        if (a.phase === "funded") cohorts[k].funded.add(a._email);
      }
      for (const p of pays) {
        const k = emailToCohort[p._email];
        if (!k || !cohorts[k]) continue;
        if (p.dir === "out" && p.type === "Challenge") cohorts[k].revenue += p.amount;
        if (p.dir === "in" && p.type === "Retrait") cohorts[k].payouts += p.amount;
      }
      const cohortRows = Object.entries(cohorts).sort((a, b) => b[0].localeCompare(a[0])).map(([k, c]) => {
        const net = c.revenue - c.payouts;
        return [cohortLabel(k), c.users, c.buyers.size, pct(c.buyers.size, c.users) + "%", c.passed.size, c.funded.size, fmt(c.revenue), fmt(c.payouts), fmt(net)];
      });
      registerCsv("cohorts", "spovibe_analytics_cohortes.csv", ["Mois", "Inscrits", "Acheteurs", "Buyer%", "Réussis", "Financés", "Revenue", "Payouts", "Net"], cohortRows);

      const cohortsHtml = `
        <div class="card" style="padding:18px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;">
            <div><h3 style="margin:0;">Cohortes par mois d'inscription</h3><p class="muted" style="margin:2px 0 0;font-size:0.84rem;">Qualité économique de chaque vague d'utilisateurs</p></div>
            ${csvBtn("cohorts", "Export CSV")}
          </div>
          ${cohortRows.length ? `<div style="overflow-x:auto;"><table class="history" style="min-width:760px;font-size:0.86rem;"><thead><tr><th>Mois</th><th>Inscrits</th><th>Acheteurs</th><th>Buyer %</th><th>Réussis</th><th>Financés</th><th>Revenue</th><th>Payouts</th><th>Net</th></tr></thead><tbody>${cohortRows.map(r => `<tr><td><b>${r[0]}</b></td><td>${r[1]}</td><td>${r[2]}</td><td class="muted">${r[3]}</td><td class="pos">${r[4]}</td><td class="pos">${r[5]}</td><td>${r[6]}</td><td>${r[7]}</td><td class="${parseFloat(r[8]) >= 0 ? 'pos' : 'neg'}"><b>${r[8]}</b></td></tr>`).join("")}</tbody></table></div>` : '<p class="muted">Aucune cohorte.</p>'}
        </div>`;

      // ---------- 5. SÉRIES TEMPORELLES ----------
      const sUsers = users.map(u => ({ at: u.created, _weight: 1 }));
      const sRev = pays.filter(p => p.dir === "out" && p.type === "Challenge").map(p => ({ at: p.at, _weight: p.amount }));
      const sPay = pays.filter(p => p.dir === "in" && p.type === "Retrait").map(p => ({ at: p.at, _weight: p.amount }));
      const periods = [
        { d: 7, label: "7 derniers jours", gran: "day" },
        { d: 30, label: "30 derniers jours", gran: "day" },
        { d: 90, label: "90 derniers jours", gran: "week" },
        { d: null, label: "All-time", gran: "month" },
      ];
      function chartCard(title, series, period, color, fmt) {
        const b = bucketize(series, x => x.at, period.d, period.gran);
        const sum = series.reduce((s, x) => s + (x._weight || 1), 0);
        return `<div style="background:var(--bg-2);border:1px solid var(--border);border-radius:12px;padding:12px;">
          <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);font-weight:700;margin-bottom:6px;">${period.label}</div>
          <div style="font-size:1.1rem;font-weight:800;font-family:var(--font);margin-bottom:8px;">${fmt(sum)}</div>
          ${svgBarChart(b.values, b.labels, { color, fmt })}
        </div>`;
      }
      function chartRow(title, series, color, valueFmt) {
        return `<div style="margin-bottom:18px;">
          <h4 style="margin:0 0 10px;">${title}</h4>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;">
            ${periods.map(p => chartCard(title, series, p, color, valueFmt)).join("")}
          </div>
        </div>`;
      }
      const seriesHtml = `
        <div class="card" style="padding:18px;">
          <h3 style="margin:0 0 14px;">Séries temporelles</h3>
          ${chartRow("Inscriptions", sUsers, "var(--lavande)", n => `${Math.round(n)}`)}
          ${chartRow("Revenue (€)", sRev, "#22c55e", n => fmt(Math.round(n)))}
          ${chartRow("Payouts (€)", sPay, "#f97316", n => fmt(Math.round(n)))}
        </div>`;

      // ---------- 6. TOP TRADERS & ALERTES ----------
      const traders = accounts.filter(a => a.phase === "funded").map(a => ({
        email: a._email, name: a._name, vertical: a.vertical, tier: a.tier && a.tier.name, balance: a.balance, capital: a.capital, profit: a.balance - a.capital, withdrawn: a.withdrawn || 0,
      }));
      const topByBalance = [...traders].sort((a, b) => b.balance - a.balance).slice(0, 10);
      const topByWithdrawn = [...traders].sort((a, b) => b.withdrawn - a.withdrawn).slice(0, 5);
      const fundedLoss = traders.filter(t => t.balance < t.capital).sort((a, b) => a.profit - b.profit);

      registerCsv("top_balance", "spovibe_analytics_top_traders.csv", ["Email", "Nom", "Vertical", "Palier", "Solde", "Capital", "Profit", "Retiré"], topByBalance.map(t => [t.email, t.name, t.vertical, t.tier, t.balance, t.capital, t.profit, t.withdrawn]));

      const tradersHtml = `
        <div class="grid grid-2" style="gap:16px;">
          <div class="card" style="padding:18px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
              <h3 style="margin:0;">Top 10 soldes</h3>
              ${csvBtn("top_balance", "CSV")}
            </div>
            ${topByBalance.length ? `<table class="history" style="width:100%;font-size:0.84rem;"><thead><tr><th>Trader</th><th>Palier</th><th>Solde</th><th>Profit</th></tr></thead><tbody>${topByBalance.map(t => `<tr><td><b>${SF.escapeHtml(t.name)}</b><br><span class="muted" style="font-size:0.74rem;">${SF.escapeHtml(t.email)}</span></td><td>${SF.escapeHtml(t.tier || '?')}</td><td>${fmt2(t.balance)}</td><td class="${t.profit >= 0 ? 'pos' : 'neg'}">${t.profit >= 0 ? '+' : ''}${fmt2(t.profit)}</td></tr>`).join("")}</tbody></table>` : '<p class="muted">Aucun compte financé.</p>'}
          </div>
          <div class="card" style="padding:18px;">
            <h3 style="margin:0 0 10px;">Top 5 retraits cumulés</h3>
            ${topByWithdrawn.length ? `<table class="history" style="width:100%;font-size:0.84rem;"><thead><tr><th>Trader</th><th>Palier</th><th>Total retiré</th></tr></thead><tbody>${topByWithdrawn.map(t => `<tr><td><b>${SF.escapeHtml(t.name)}</b><br><span class="muted" style="font-size:0.74rem;">${SF.escapeHtml(t.email)}</span></td><td>${SF.escapeHtml(t.tier || '?')}</td><td><b>${fmt2(t.withdrawn)}</b></td></tr>`).join("")}</tbody></table>` : '<p class="muted">Aucun retrait pour l\'instant.</p>'}
          </div>
        </div>
        ${fundedLoss.length ? `<div class="card" style="padding:18px;border-left:4px solid var(--orange);">
          <h3 style="margin:0 0 10px;">⚠ Comptes financés en perte (${fundedLoss.length})</h3>
          <p class="muted" style="margin:0 0 12px;font-size:0.84rem;">Solde < capital initial — concentration de risque à surveiller.</p>
          <table class="history" style="width:100%;font-size:0.84rem;"><thead><tr><th>Trader</th><th>Palier</th><th>Solde</th><th>Perte cycle</th></tr></thead><tbody>${fundedLoss.slice(0, 10).map(t => `<tr><td><b>${SF.escapeHtml(t.name)}</b><br><span class="muted" style="font-size:0.74rem;">${SF.escapeHtml(t.email)}</span></td><td>${SF.escapeHtml(t.tier || '?')}</td><td>${fmt2(t.balance)}</td><td class="neg"><b>${fmt2(t.profit)}</b></td></tr>`).join("")}</tbody></table>
        </div>` : ""}`;

      // ---------- 7. ALERTES SANTÉ ----------
      const alerts = [];
      if (revenue > 0 && marginPct < 0) alerts.push({ level: "danger", msg: `Marge brute négative (${marginPct}%). Les payouts dépassent les encaissements.` });
      else if (revenue > 5000 && marginPct < 20) alerts.push({ level: "warn", msg: `Marge brute faible (${marginPct}%). Cible saine prop firm : 40-60%.` });
      if (finished.length >= 5 && passRate > 25) alerts.push({ level: "warn", msg: `Pass rate élevé (${passRate}%). Cible saine : 8-15%. Les challenges sont peut-être trop faciles.` });
      if (finished.length >= 5 && passRate < 3) alerts.push({ level: "warn", msg: `Pass rate très faible (${passRate}%). Aucun trader ne réussit, la beta va décrocher.` });
      if (traders.length >= 3 && fundedLoss.length / Math.max(1, traders.length) > 0.5) alerts.push({ level: "warn", msg: `${Math.round(fundedLoss.length / traders.length * 100)}% de comptes financés en perte. Concentration de risque à surveiller.` });
      if (revenue > 0 && exposureFunded > revenue * 3) alerts.push({ level: "warn", msg: `Exposition (${fmt(exposureFunded)}) très supérieure au revenue (${fmt(revenue)}). Risque de payouts cumulés > marge.` });
      const alertsHtml = alerts.length ? `<div class="card" style="padding:14px 18px;background:linear-gradient(135deg,#fff7ed,#ffedd5);border-color:var(--orange);"><h3 style="margin:0 0 10px;color:var(--orange);">Alertes santé</h3>${alerts.map(a => `<div style="display:flex;gap:10px;align-items:flex-start;padding:8px 0;${alerts.length > 1 ? 'border-bottom:1px solid rgba(0,0,0,0.05);' : ''}"><div style="font-size:1.1rem;line-height:1;">${a.level === 'danger' ? '🔴' : '⚠'}</div><div style="font-size:0.9rem;">${a.msg}</div></div>`).join("")}</div>` : `<div class="card center" style="padding:14px 18px;background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-color:var(--green);"><span style="color:var(--green);font-weight:700;">✓ Aucune alerte santé — KPIs dans les clous.</span></div>`;

      // ---------- LAYOUT FINAL ----------
      return `<div style="display:flex;flex-direction:column;gap:18px;">
        ${alertsHtml}
        ${funnelHtml}
        ${freePayingHtml}
        ${moneyHtml}
        ${passHtml}
        ${cohortsHtml}
        ${seriesHtml}
        ${tradersHtml}
      </div>`;
    }

    // =====================================================
    // RISK REPORTS — onglets multiples sous une seule section
    // =====================================================
    let _riskTab = "challenges";  // onglet actif (persiste durant la session)
    const RISK_TABS = [
      ["challenges", "Paliers vs Retraits"],
      ["verticals", "Verticaux vs Retraits"],
      ["earners", "Top traders payés"],
      ["losers", "Comptes financés en perte"],
      ["lossTime", "Pertes hebdomadaires"],
      ["status", "Analyse par statut"],
      ["drawdown", "Analyse drawdown"],
    ];
    window.setRiskTab = (k) => { _riskTab = k; render(); };

    function viewRisk() {
      const users = adminUsers();
      const accounts = adminAccounts();
      const pays = adminPayments();
      const pct = (a, b) => b ? Math.round((a / b) * 100) : 0;

      // --- ONGLETS HTML ---
      const tabsBar = `<div class="risk-tabs">
        ${RISK_TABS.map(([k, l]) => `<button class="${k === _riskTab ? 'active' : ''}" onclick="setRiskTab('${k}')">${l}</button>`).join("")}
      </div>`;

      // ============ Helpers communs ============
      function groupByTier() {
        const out = {};
        for (const a of accounts) {
          const key = (a.tier && a.tier.name) || "?";
          if (!out[key]) out[key] = { name: key, vertical: a.vertical, capital: a.tier && a.tier.capital, accounts: [], passed: 0, failed: 0, funded: 0, active: 0 };
          out[key].accounts.push(a);
          if (a.phase === "funded") out[key].funded++;
          else if (a.status === "passed") out[key].passed++;
          else if (a.status === "failed") out[key].failed++;
          else out[key].active++;
        }
        for (const k of Object.keys(out)) {
          const t = out[k];
          // Revenue : extrait des payments label "Challenge <name>"
          t.revenue = pays.filter(p => p.dir === "out" && p.type === "Challenge" && p.label.match(new RegExp(`Challenge\\s+${k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\s+·`))).reduce((s, p) => s + p.amount, 0);
          // Payouts : retraits faits par les users qui ont ce tier en funded
          const tierEmails = new Set(t.accounts.filter(a => a.phase === "funded").map(a => a._email));
          t.payouts = pays.filter(p => p.dir === "in" && p.type === "Retrait" && tierEmails.has(p._email)).reduce((s, p) => s + p.amount, 0);
          t.profitMargin = t.revenue - t.payouts;
          t.payoutCount = pays.filter(p => p.dir === "in" && p.type === "Retrait" && tierEmails.has(p._email)).length;
          t.payoutPct = t.funded ? Math.round((tierEmails.size > 0 ? t.payoutCount / t.funded : 0) * 100) : 0;
        }
        return Object.values(out);
      }

      // ============ Tab 1 : Challenge Vs Payouts ============
      if (_riskTab === "challenges") {
        const tiers = groupByTier().sort((a, b) => b.revenue - a.revenue);
        const rows = tiers.map(t => [t.name, t.revenue, t.payouts, t.profitMargin, pct(t.profitMargin, t.revenue), t.payoutCount, t.payoutPct, t.funded]);
        registerCsv("risk_challenges", "spovibe_risk_paliers.csv", ["Palier", "Revenue", "Retraits totaux", "Marge brute", "Marge %", "Nb retraits", "% comptes payés", "Comptes financés"], rows);
        return `${tabsBar}
          <div class="card" style="padding:0;overflow:hidden;">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);">
              <div>
                <h3 style="margin:0;font-size:1.1rem;">Statistiques par palier</h3>
                <p class="muted" style="margin:2px 0 0;font-size:0.82rem;">Performance économique par palier de challenge</p>
              </div>
              ${csvBtn("risk_challenges", "Export")}
            </div>
            ${tiers.length ? `<div style="overflow-x:auto;"><table class="risk-table" style="width:100%;border-collapse:collapse;min-width:920px;">
              <thead><tr>
                <th>Palier</th><th>Revenue</th><th>Retraits totaux (après split)</th><th>Marge brute</th><th>Nb retraits</th><th>% comptes payés</th><th>Comptes financés</th>
              </tr></thead>
              <tbody>${tiers.map(t => {
                const marginPctTier = pct(t.profitMargin, t.revenue);
                return `<tr>
                  <td><b>${SF.escapeHtml(t.name)}</b><br><span class="muted" style="font-size:0.74rem;">${t.vertical === 'predictions' ? 'Prédictions' : 'Sports'} · ${fmt(t.capital || 0)}</span></td>
                  <td><b>${fmt2(t.revenue)}</b></td>
                  <td>${fmt2(t.payouts)}</td>
                  <td><b style="color:${t.profitMargin >= 0 ? '#16a34a' : '#dc2626'};">${t.profitMargin >= 0 ? '+' : ''}${fmt2(t.profitMargin)}</b> <span class="muted" style="font-size:0.78rem;">(${marginPctTier}%)</span></td>
                  <td>${t.payoutCount}</td>
                  <td>${t.payoutPct}%</td>
                  <td><span class="risk-pill ${t.funded > 0 ? 'pos' : 'neutral'}">${t.funded}</span></td>
                </tr>`;
              }).join("")}</tbody>
            </table></div>` : '<p class="muted" style="padding:30px;text-align:center;">Aucune donnée par palier.</p>'}
          </div>`;
      }

      // ============ Tab 2 : Vertical Vs Payouts ============
      if (_riskTab === "verticals") {
        const data = { sports: { revenue: 0, payouts: 0, funded: 0, count: 0, active: 0, passed: 0, failed: 0 }, predictions: { revenue: 0, payouts: 0, funded: 0, count: 0, active: 0, passed: 0, failed: 0 } };
        for (const a of accounts) {
          const v = a.vertical;
          if (!data[v]) continue;
          data[v].count++;
          if (a.phase === "funded") data[v].funded++;
          if (a.status === "passed") data[v].passed++;
          if (a.status === "failed") data[v].failed++;
          if (a.status === "active") data[v].active++;
        }
        for (const p of pays) {
          if (p.dir === "out" && p.type === "Challenge") {
            const v = /\(Sports\)/.test(p.label) ? "sports" : /\(Prédictions\)/.test(p.label) ? "predictions" : null;
            if (v) data[v].revenue += p.amount;
          }
          if (p.dir === "in" && p.type === "Retrait") {
            // Trouve la vertical active du user au moment du retrait (approximation : utilise leur vertical funded actuel)
            const userAccs = accounts.filter(a => a._email === p._email && a.phase === "funded");
            const v = userAccs[0] ? userAccs[0].vertical : null;
            if (v && data[v]) data[v].payouts += p.amount;
          }
        }
        const rows = [["sports", "Sports"], ["predictions", "Prédictions"]].map(([v, label]) => {
          const d = data[v]; const margin = d.revenue - d.payouts;
          return [label, d.revenue, d.payouts, margin, pct(margin, d.revenue), d.count, d.active, d.passed, d.failed, d.funded];
        });
        registerCsv("risk_verticals", "spovibe_risk_verticaux.csv", ["Vertical", "Revenue", "Retraits", "Marge", "Marge %", "Total comptes", "Actifs", "Réussis", "Échoués", "Financés"], rows);
        return `${tabsBar}
          <div class="card" style="padding:0;overflow:hidden;">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);">
              <div><h3 style="margin:0;font-size:1.1rem;">Statistiques par vertical</h3><p class="muted" style="margin:2px 0 0;font-size:0.82rem;">Sports vs Prédictions — performance et distribution des comptes</p></div>
              ${csvBtn("risk_verticals", "Export")}
            </div>
            <div style="overflow-x:auto;"><table class="risk-table" style="width:100%;border-collapse:collapse;min-width:920px;">
              <thead><tr><th>Vertical</th><th>Revenue</th><th>Retraits</th><th>Marge</th><th>Total comptes</th><th>Actifs</th><th>Réussis</th><th>Échoués</th><th>Financés</th></tr></thead>
              <tbody>${rows.map(r => {
                const margin = r[3]; const marginPctV = r[4];
                return `<tr>
                  <td><b>${r[0]}</b></td>
                  <td><b>${fmt(r[1])}</b></td>
                  <td>${fmt(r[2])}</td>
                  <td><b style="color:${margin >= 0 ? '#16a34a' : '#dc2626'};">${margin >= 0 ? '+' : ''}${fmt(margin)}</b> <span class="muted" style="font-size:0.78rem;">(${marginPctV}%)</span></td>
                  <td>${r[5]}</td>
                  <td>${r[6]}</td>
                  <td><span class="risk-pill pos">${r[7]}</span></td>
                  <td><span class="risk-pill neg">${r[8]}</span></td>
                  <td><span class="risk-pill warn">${r[9]}</span></td>
                </tr>`;
              }).join("")}</tbody>
            </table></div>
          </div>`;
      }

      // ============ Tab 3 : Highest Earners ============
      if (_riskTab === "earners") {
        const payoutsByUser = {};
        for (const p of pays.filter(x => x.dir === "in" && x.type === "Retrait")) {
          if (!payoutsByUser[p._email]) payoutsByUser[p._email] = { email: p._email, name: p._name, total: 0, count: 0, max: 0, firstAt: p.at, lastAt: p.at };
          payoutsByUser[p._email].total += p.amount;
          payoutsByUser[p._email].count++;
          payoutsByUser[p._email].max = Math.max(payoutsByUser[p._email].max, p.amount);
          payoutsByUser[p._email].firstAt = Math.min(payoutsByUser[p._email].firstAt, p.at);
          payoutsByUser[p._email].lastAt = Math.max(payoutsByUser[p._email].lastAt, p.at);
        }
        // Ajoute le palier/vertical
        for (const u of Object.values(payoutsByUser)) {
          const accs = accounts.filter(a => a._email === u.email && a.phase === "funded");
          u.tier = accs[0] ? accs[0].tier && accs[0].tier.name : "?";
          u.vertical = accs[0] ? accs[0].vertical : "?";
          u.profit = accs.reduce((s, a) => s + (a.balance - a.capital), 0);
        }
        const list = Object.values(payoutsByUser).sort((a, b) => b.total - a.total);
        registerCsv("risk_earners", "spovibe_risk_top_payes.csv",
          ["Email", "Nom", "Vertical", "Palier", "Total retiré", "Nb retraits", "Plus gros retrait", "Profit cycle", "1er retrait", "Dernier retrait"],
          list.map(u => [u.email, u.name, u.vertical, u.tier, u.total, u.count, u.max, u.profit, fmtDate(u.firstAt), fmtDate(u.lastAt)])
        );
        return `${tabsBar}
          <div class="card" style="padding:0;overflow:hidden;">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);">
              <div><h3 style="margin:0;font-size:1.1rem;">Top traders payés</h3><p class="muted" style="margin:2px 0 0;font-size:0.82rem;">Traders avec le plus de retraits cumulés — concentration de risque payout</p></div>
              ${csvBtn("risk_earners", "Export")}
            </div>
            ${list.length ? `<div style="overflow-x:auto;"><table class="risk-table" style="width:100%;border-collapse:collapse;min-width:920px;">
              <thead><tr><th>Trader</th><th>Vertical</th><th>Palier</th><th>Total retiré</th><th>Retraits</th><th>+ gros retrait</th><th>Profit cycle</th><th>Dernier retrait</th></tr></thead>
              <tbody>${list.slice(0, 50).map(u => `<tr>
                <td><b>${SF.escapeHtml(u.name)}</b><br><span class="muted" style="font-size:0.74rem;">${SF.escapeHtml(u.email)}</span></td>
                <td>${u.vertical === 'predictions' ? 'Prédictions' : u.vertical === 'sports' ? 'Sports' : '?'}</td>
                <td>${SF.escapeHtml(u.tier || '?')}</td>
                <td><b style="color:#16a34a;">${fmt2(u.total)}</b></td>
                <td>${u.count}</td>
                <td>${fmt2(u.max)}</td>
                <td class="${u.profit >= 0 ? 'pos' : 'neg'}">${u.profit >= 0 ? '+' : ''}${fmt2(u.profit)}</td>
                <td class="muted">${fmtDate(u.lastAt)}</td>
              </tr>`).join("")}</tbody>
            </table></div>${list.length > 50 ? `<p class="muted" style="padding:14px;font-size:0.82rem;">Affichage des 50 premiers sur ${list.length} traders avec retraits. Export CSV complet disponible.</p>` : ""}` : '<p class="muted" style="padding:30px;text-align:center;">Aucun retrait effectué pour le moment.</p>'}
          </div>`;
      }

      // ============ Tab 4 : Comptes financés en perte ============
      if (_riskTab === "losers") {
        const losers = accounts.filter(a => a.phase === "funded" && a.balance < a.capital).map(a => {
          const ddPct = Math.round((1 - a.balance / a.capital) * 100);
          return { email: a._email, name: a._name, vertical: a.vertical, tier: a.tier && a.tier.name, capital: a.capital, balance: a.balance, loss: a.capital - a.balance, ddPct, withdrawn: a.withdrawn || 0, fundedAt: a.fundedAt };
        }).sort((a, b) => b.loss - a.loss);
        registerCsv("risk_losers", "spovibe_risk_losers.csv",
          ["Email", "Nom", "Vertical", "Palier", "Capital", "Solde", "Perte", "DD %", "Retiré"],
          losers.map(l => [l.email, l.name, l.vertical, l.tier, l.capital, l.balance, l.loss, l.ddPct + "%", l.withdrawn])
        );
        const totalLoss = losers.reduce((s, l) => s + l.loss, 0);
        return `${tabsBar}
          <div class="adm-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:16px;">
            <div class="adm-stat featured"><div class="k">Comptes en perte</div><div class="v">${losers.length}</div></div>
            <div class="adm-stat"><div class="k">Perte cumulée</div><div class="v neg">${fmt2(totalLoss)}</div></div>
            <div class="adm-stat"><div class="k">Perte moyenne</div><div class="v neg">${losers.length ? fmt2(totalLoss / losers.length) : '—'}</div></div>
          </div>
          <div class="card" style="padding:0;overflow:hidden;">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);">
              <div><h3 style="margin:0;font-size:1.1rem;">Comptes financés en perte</h3><p class="muted" style="margin:2px 0 0;font-size:0.82rem;">Traders funded dont le solde est tombé sous le capital initial</p></div>
              ${csvBtn("risk_losers", "Export")}
            </div>
            ${losers.length ? `<div style="overflow-x:auto;"><table class="risk-table" style="width:100%;border-collapse:collapse;min-width:920px;">
              <thead><tr><th>Trader</th><th>Vertical</th><th>Palier</th><th>Capital</th><th>Solde</th><th>Perte</th><th>DD %</th><th>Déjà retiré</th></tr></thead>
              <tbody>${losers.map(l => `<tr>
                <td><b>${SF.escapeHtml(l.name)}</b><br><span class="muted" style="font-size:0.74rem;">${SF.escapeHtml(l.email)}</span></td>
                <td>${l.vertical === 'predictions' ? 'Prédictions' : 'Sports'}</td>
                <td>${SF.escapeHtml(l.tier || '?')}</td>
                <td>${fmt(l.capital)}</td>
                <td>${fmt2(l.balance)}</td>
                <td><b style="color:#dc2626;">−${fmt2(l.loss)}</b></td>
                <td><span class="risk-pill ${l.ddPct > 7 ? 'neg' : 'warn'}">${l.ddPct}%</span></td>
                <td>${fmt2(l.withdrawn)}</td>
              </tr>`).join("")}</tbody>
            </table></div>` : '<p class="muted" style="padding:30px;text-align:center;">✓ Aucun compte financé en perte actuellement.</p>'}
          </div>`;
      }

      // ============ Tab 5 : Revenue Loss Over Time ============
      if (_riskTab === "lossTime") {
        // On bucketise par semaine sur 90 jours (ou par mois si all-time)
        const now = Date.now();
        const buckets = {}; // key "ww/yyyy" → {revenue, payouts}
        for (const p of pays) {
          if (p.at < now - 365 * 86400000) continue;
          const d = new Date(p.at);
          const wk = Math.floor((d - new Date(d.getFullYear(), 0, 1)) / (7 * 86400000));
          const key = `S${wk + 1} ${d.getFullYear()}`;
          if (!buckets[key]) buckets[key] = { label: key, revenue: 0, payouts: 0, ts: p.at };
          if (p.dir === "out" && p.type === "Challenge") buckets[key].revenue += p.amount;
          if (p.dir === "in" && p.type === "Retrait") buckets[key].payouts += p.amount;
        }
        const series = Object.values(buckets).sort((a, b) => a.ts - b.ts);
        const lossWeeks = series.filter(b => b.payouts > b.revenue);
        registerCsv("risk_loss_time", "spovibe_risk_loss_time.csv", ["Semaine", "Revenue", "Payouts", "Net"], series.map(s => [s.label, s.revenue, s.payouts, s.revenue - s.payouts]));
        return `${tabsBar}
          <div class="adm-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:16px;">
            <div class="adm-stat"><div class="k">Semaines en perte</div><div class="v ${lossWeeks.length > 0 ? 'neg' : 'pos'}">${lossWeeks.length}</div><div class="s">Sur ${series.length} dernières</div></div>
            <div class="adm-stat"><div class="k">Pire semaine</div><div class="v neg">${lossWeeks.length ? fmt(Math.min(...lossWeeks.map(w => w.revenue - w.payouts))) : '—'}</div></div>
            <div class="adm-stat featured"><div class="k">Net cumulé 12 mois</div><div class="v">${fmt(series.reduce((s, w) => s + w.revenue - w.payouts, 0))}</div></div>
          </div>
          <div class="card" style="padding:0;overflow:hidden;">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);">
              <div><h3 style="margin:0;font-size:1.1rem;">Pertes hebdomadaires</h3><p class="muted" style="margin:2px 0 0;font-size:0.82rem;">Semaines où les retraits ont dépassé le revenue</p></div>
              ${csvBtn("risk_loss_time", "Export")}
            </div>
            ${series.length ? `<div style="overflow-x:auto;"><table class="risk-table" style="width:100%;border-collapse:collapse;min-width:680px;">
              <thead><tr><th>Semaine</th><th>Revenue</th><th>Payouts</th><th>Net</th><th>Statut</th></tr></thead>
              <tbody>${series.slice(-26).reverse().map(b => {
                const net = b.revenue - b.payouts;
                return `<tr>
                  <td><b>${b.label}</b></td>
                  <td>${fmt(b.revenue)}</td>
                  <td>${fmt(b.payouts)}</td>
                  <td><b style="color:${net >= 0 ? '#16a34a' : '#dc2626'};">${net >= 0 ? '+' : ''}${fmt(net)}</b></td>
                  <td><span class="risk-pill ${net >= 0 ? 'pos' : 'neg'}">${net >= 0 ? 'Profit' : 'Perte'}</span></td>
                </tr>`;
              }).join("")}</tbody>
            </table></div>` : '<p class="muted" style="padding:30px;text-align:center;">Pas assez de données pour une analyse temporelle.</p>'}
          </div>`;
      }

      // ============ Tab 6 : Account Status Analysis ============
      if (_riskTab === "status") {
        const buckets = { active: { count: 0, capital: 0, balance: 0 }, passed: { count: 0, capital: 0, balance: 0 }, failed: { count: 0, capital: 0, balance: 0 }, funded: { count: 0, capital: 0, balance: 0, withdrawn: 0 } };
        for (const a of accounts) {
          const k = a.phase === "funded" ? "funded" : a.status;
          if (!buckets[k]) continue;
          buckets[k].count++;
          buckets[k].capital += a.capital;
          buckets[k].balance += a.balance;
          if (k === "funded") buckets[k].withdrawn += (a.withdrawn || 0);
        }
        const tot = buckets.active.count + buckets.passed.count + buckets.failed.count + buckets.funded.count;
        const rows = Object.entries(buckets).map(([k, b]) => [k, b.count, pct(b.count, tot), b.capital, b.balance, b.balance - b.capital, k === "funded" ? b.withdrawn : "—"]);
        registerCsv("risk_status", "spovibe_risk_status.csv", ["Statut", "Comptes", "Part %", "Capital total", "Solde total", "P&L cumulé", "Retiré"], rows);
        const labels = { active: "En évaluation", passed: "Réussi (à activer)", failed: "Échoué", funded: "Financé" };
        const colors = { active: "neutral", passed: "pos", failed: "neg", funded: "warn" };
        return `${tabsBar}
          <div class="card" style="padding:0;overflow:hidden;">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);">
              <div><h3 style="margin:0;font-size:1.1rem;">Analyse par statut de compte</h3><p class="muted" style="margin:2px 0 0;font-size:0.82rem;">Distribution des comptes par statut + capital total et P&L cumulé</p></div>
              ${csvBtn("risk_status", "Export")}
            </div>
            <div style="overflow-x:auto;"><table class="risk-table" style="width:100%;border-collapse:collapse;min-width:780px;">
              <thead><tr><th>Statut</th><th>Comptes</th><th>Part %</th><th>Capital total</th><th>Solde total</th><th>P&L cumulé</th><th>Retiré</th></tr></thead>
              <tbody>${rows.map(r => {
                const k = r[0]; const pnl = r[5];
                return `<tr>
                  <td><span class="risk-pill ${colors[k]}">${labels[k]}</span></td>
                  <td><b>${r[1]}</b></td>
                  <td>${r[2]}%</td>
                  <td>${fmt(r[3])}</td>
                  <td>${fmt(r[4])}</td>
                  <td><b style="color:${pnl >= 0 ? '#16a34a' : '#dc2626'};">${pnl >= 0 ? '+' : ''}${fmt2(pnl)}</b></td>
                  <td>${r[6] === "—" ? '—' : fmt2(r[6])}</td>
                </tr>`;
              }).join("")}</tbody>
            </table></div>
          </div>`;
      }

      // ============ Tab 7 : Drawdown Analysis ============
      if (_riskTab === "drawdown") {
        const finished = accounts.filter(a => a.status === "passed" || a.status === "failed" || a.phase === "funded");
        if (!finished.length) return `${tabsBar}<div class="card center" style="padding:46px;"><p class="muted">Pas encore de challenges terminés à analyser.</p></div>`;
        const withDD = finished.map(a => {
          const minBalance = Math.min(a.capital, ...((a.bets || []).map(b => null).filter(Boolean)));
          // Calcule le DD à partir des bets : approximation depuis peak vs lowest balance observé
          const ddPctActual = a.peak ? Math.round((1 - Math.min(a.balance, a.capital) / a.peak) * 100) : 0;
          return {
            email: a._email, name: a._name, vertical: a.vertical, tier: a.tier && a.tier.name,
            status: a.phase === "funded" ? "funded" : a.status,
            ddPct: ddPctActual,
            ddAllowed: a.tier && a.tier.maxDD || 0,
            ddUsage: a.tier && a.tier.maxDD ? Math.round(ddPctActual / a.tier.maxDD * 100) : 0,
            profitPct: a.capital ? Math.round((a.balance - a.capital) / a.capital * 100) : 0,
          };
        });
        const list = withDD.sort((a, b) => b.ddPct - a.ddPct);
        registerCsv("risk_drawdown", "spovibe_risk_drawdown.csv", ["Email", "Nom", "Vertical", "Palier", "Statut", "DD %", "DD autorisé %", "Usage DD %", "Profit %"], list.map(d => [d.email, d.name, d.vertical, d.tier, d.status, d.ddPct, d.ddAllowed, d.ddUsage + "%", d.profitPct + "%"]));
        const avgDD = Math.round(withDD.reduce((s, d) => s + d.ddPct, 0) / withDD.length);
        const avgUsage = Math.round(withDD.reduce((s, d) => s + d.ddUsage, 0) / withDD.length);
        return `${tabsBar}
          <div class="adm-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:16px;">
            <div class="adm-stat featured"><div class="k">DD moyen utilisé</div><div class="v">${avgDD}%</div></div>
            <div class="adm-stat"><div class="k">% du DD autorisé consommé</div><div class="v">${avgUsage}%</div><div class="s">Cible saine : < 80%</div></div>
            <div class="adm-stat"><div class="k">Comptes au plafond</div><div class="v neg">${withDD.filter(d => d.ddUsage >= 90).length}</div><div class="s">Usage ≥ 90%</div></div>
          </div>
          <div class="card" style="padding:0;overflow:hidden;">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);">
              <div><h3 style="margin:0;font-size:1.1rem;">Analyse du drawdown</h3><p class="muted" style="margin:2px 0 0;font-size:0.82rem;">Drawdown consommé par compte vs DD autorisé du palier</p></div>
              ${csvBtn("risk_drawdown", "Export")}
            </div>
            <div style="overflow-x:auto;"><table class="risk-table" style="width:100%;border-collapse:collapse;min-width:920px;">
              <thead><tr><th>Trader</th><th>Vertical</th><th>Palier</th><th>Statut</th><th>DD réel</th><th>DD autorisé</th><th>Usage</th><th>Profit cycle</th></tr></thead>
              <tbody>${list.slice(0, 50).map(d => `<tr>
                <td><b>${SF.escapeHtml(d.name)}</b><br><span class="muted" style="font-size:0.74rem;">${SF.escapeHtml(d.email)}</span></td>
                <td>${d.vertical === 'predictions' ? 'Prédictions' : 'Sports'}</td>
                <td>${SF.escapeHtml(d.tier || '?')}</td>
                <td><span class="risk-pill ${d.status === 'funded' ? 'warn' : d.status === 'passed' ? 'pos' : 'neg'}">${d.status === 'funded' ? 'Financé' : d.status === 'passed' ? 'Réussi' : 'Échoué'}</span></td>
                <td><b>${d.ddPct}%</b></td>
                <td class="muted">${d.ddAllowed}%</td>
                <td><span class="risk-pill ${d.ddUsage >= 90 ? 'neg' : d.ddUsage >= 70 ? 'warn' : 'pos'}">${d.ddUsage}%</span></td>
                <td class="${d.profitPct >= 0 ? 'pos' : 'neg'}">${d.profitPct >= 0 ? '+' : ''}${d.profitPct}%</td>
              </tr>`).join("")}</tbody>
            </table></div>
          </div>`;
      }

      return `${tabsBar}<p class="muted">Onglet inconnu.</p>`;
    }

    // ============= POLYMARKET ADMIN VIEW =============
    let _polyOpenPositions = [];
    let _polySyncState = "idle"; // "idle" | "syncing" | "settling"
    let _polyLastResult = null;

    async function loadPolymarketAdminData() {
      try {
        const c = SpovibeAuth.client();
        const { data, error } = await c.from("predictions_positions").select("*").order("opened_at", { ascending: false });
        if (error) return false;
        _polyOpenPositions = data || [];
        return true;
      } catch (e) { return false; }
    }

    window.polySync = async () => {
      _polySyncState = "syncing"; render();
      try {
        SpovibePolymarket.clearCache();
        const markets = await SpovibePolymarket.getMarkets({ bypassCache: true });
        _polyLastResult = { type: "sync", markets: markets.length, at: Date.now() };
      } catch (e) {
        _polyLastResult = { type: "sync", error: e.message, at: Date.now() };
      }
      _polySyncState = "idle"; render();
    };

    window.polySettleAll = async () => {
      _polySyncState = "settling"; render();
      try {
        const r = await SpovibePolymarket.adminSettleAllPositions();
        await loadPolymarketAdminData();
        _polyLastResult = Object.assign({ type: "settle", at: Date.now() }, r);
      } catch (e) {
        _polyLastResult = { type: "settle", error: e.message, at: Date.now() };
      }
      _polySyncState = "idle"; render();
    };

    function viewPolymarket() {
      // On charge en arrière-plan à la 1re visite, mais on render immédiatement
      if (!_polyOpenPositions.length && _polySyncState === "idle") {
        loadPolymarketAdminData().then(() => render());
      }
      const open = _polyOpenPositions.filter(p => p.status === "open");
      const settled = _polyOpenPositions.filter(p => p.status !== "open");
      const totalStaked = open.reduce((s, p) => s + Number(p.stake), 0);
      const totalShares = open.reduce((s, p) => s + Number(p.shares), 0);

      // Distribution par catégorie
      const byCat = {};
      for (const p of open) byCat[p.category || "other"] = (byCat[p.category || "other"] || 0) + 1;

      // CSV
      registerCsv("poly_open", "spovibe_polymarket_open_positions.csv",
        ["User ID", "Marché", "Catégorie", "Side", "Prix entrée", "Mise", "Shares", "Ouverte le", "End date"],
        open.map(p => [p.user_id, p.market_question, p.category, p.side, p.price_at_entry, p.stake, p.shares, p.opened_at, p.end_date])
      );
      registerCsv("poly_settled", "spovibe_polymarket_settled_positions.csv",
        ["User ID", "Marché", "Side", "Outcome", "Status", "Mise", "Payout", "Settled at"],
        settled.map(p => [p.user_id, p.market_question, p.side, p.resolved_outcome, p.status, p.stake, p.payout, p.settled_at])
      );

      let resultBanner = "";
      if (_polyLastResult) {
        const r = _polyLastResult;
        if (r.type === "sync") {
          resultBanner = r.error
            ? `<div class="card" style="padding:12px 16px;border-left:4px solid #dc2626;margin-bottom:16px;"><b>Erreur sync :</b> ${SF.escapeHtml(r.error)}</div>`
            : `<div class="card" style="padding:12px 16px;border-left:4px solid #16a34a;margin-bottom:16px;"><b>✓ Sync terminé :</b> ${r.markets} marchés rapatriés depuis Polymarket.</div>`;
        } else if (r.type === "settle") {
          resultBanner = r.error
            ? `<div class="card" style="padding:12px 16px;border-left:4px solid #dc2626;margin-bottom:16px;"><b>Erreur settle :</b> ${SF.escapeHtml(r.error)}</div>`
            : `<div class="card" style="padding:12px 16px;border-left:4px solid #16a34a;margin-bottom:16px;"><b>✓ ${r.settled} position(s) réglée(s).</b> ${r.errors ? r.errors + ' erreurs.' : ''} Le crédit des comptes user nécessite encore une Edge Function (Phase D).</div>`;
        }
      }

      return `
        ${resultBanner}
        <div class="adm-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:18px;">
          <div class="adm-stat featured"><div class="k">Positions ouvertes</div><div class="v">${open.length}</div></div>
          <div class="adm-stat"><div class="k">Total misé</div><div class="v">${fmt2(totalStaked)}</div></div>
          <div class="adm-stat"><div class="k">Shares en jeu</div><div class="v">${fmt2(totalShares)}</div><div class="s">Payout max si toutes gagnent</div></div>
          <div class="adm-stat"><div class="k">Positions réglées</div><div class="v">${settled.length}</div></div>
        </div>

        <div class="card" style="padding:18px;margin-bottom:18px;">
          <h3 style="margin:0 0 6px;">Synchronisation Polymarket</h3>
          <p class="muted" style="margin:0 0 14px;font-size:0.86rem;">L'API Gamma est interrogée en direct côté client. Le cache local TTL est de 10 minutes. Pour les positions, le settlement vérifie chaque marché ouvert et met à jour celles qui sont résolues.</p>
          <div style="display:flex;gap:10px;flex-wrap:wrap;">
            <button class="btn btn-primary" onclick="polySync()" ${_polySyncState !== 'idle' ? 'disabled' : ''}>
              ${_polySyncState === 'syncing' ? 'Sync en cours…' : 'Resync prices now'}
            </button>
            <button class="btn btn-ghost" onclick="polySettleAll()" ${_polySyncState !== 'idle' || !open.length ? 'disabled' : ''}>
              ${_polySyncState === 'settling' ? 'Règlement en cours…' : `Settle resolved markets (${open.length})`}
            </button>
          </div>
        </div>

        <div class="grid grid-2" style="gap:16px;">
          <div class="card" style="padding:18px;">
            <h3 style="margin:0 0 10px;">Distribution catégories (open)</h3>
            ${Object.keys(byCat).length ? `<table class="history" style="width:100%;font-size:0.86rem;"><thead><tr><th>Catégorie</th><th>Positions</th></tr></thead><tbody>${Object.entries(byCat).sort((a, b) => b[1] - a[1]).map(([cat, n]) => `<tr><td><b>${SF.escapeHtml(cat)}</b></td><td>${n}</td></tr>`).join("")}</tbody></table>` : '<p class="muted">Aucune position ouverte.</p>'}
          </div>
          <div class="card" style="padding:18px;">
            <h3 style="margin:0 0 10px;">Catégories Polymarket dispos</h3>
            <p class="muted" style="font-size:0.82rem;margin:0 0 10px;">${SpovibePolymarket.categoriesList().map(c => `<span style="display:inline-block;background:var(--bg-2);padding:4px 10px;border-radius:99px;margin:3px 4px 0 0;font-size:0.76rem;font-weight:600;">${SF.escapeHtml(c.label)}</span>`).join("")}</p>
            <p class="muted" style="font-size:0.8rem;margin:0;">Les marchés sans tag de cette liste tombent en catégorie "Autres".</p>
          </div>
        </div>

        <div class="card" style="padding:0;overflow:hidden;margin-top:18px;">
          <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);">
            <div><h3 style="margin:0;">Positions ouvertes</h3><p class="muted" style="margin:2px 0 0;font-size:0.82rem;">Toutes les positions Polymarket non encore réglées</p></div>
            ${csvBtn("poly_open", "Export")}
          </div>
          ${open.length ? `<div style="overflow-x:auto;"><table class="risk-table" style="width:100%;border-collapse:collapse;min-width:920px;">
            <thead><tr><th>User</th><th>Marché</th><th>Catégorie</th><th>Side</th><th>Prix</th><th>Mise</th><th>Shares</th><th>End date</th></tr></thead>
            <tbody>${open.slice(0, 50).map(p => `<tr>
              <td class="muted" style="font-size:0.78rem;">${SF.escapeHtml(p.user_id.slice(0, 8))}…</td>
              <td><b>${SF.escapeHtml(p.market_question)}</b></td>
              <td>${SF.escapeHtml(p.category || 'other')}</td>
              <td><span class="risk-pill ${p.side === 'Yes' ? 'pos' : 'neg'}">${p.side}</span></td>
              <td>${Math.round(Number(p.price_at_entry) * 100)}¢</td>
              <td>${fmt2(p.stake)}</td>
              <td>${fmt2(p.shares)}</td>
              <td class="muted">${p.end_date ? fmtDate(new Date(p.end_date).getTime()) : '—'}</td>
            </tr>`).join("")}</tbody>
          </table></div>${open.length > 50 ? `<p class="muted" style="padding:14px;font-size:0.82rem;">50 affichées sur ${open.length}. Export CSV complet dispo.</p>` : ''}` : '<p class="muted" style="padding:30px;text-align:center;">Aucune position ouverte pour le moment.</p>'}
        </div>

        <div class="card" style="padding:0;overflow:hidden;margin-top:18px;">
          <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);">
            <div><h3 style="margin:0;">Positions réglées</h3></div>
            ${csvBtn("poly_settled", "Export")}
          </div>
          ${settled.length ? `<div style="overflow-x:auto;"><table class="risk-table" style="width:100%;border-collapse:collapse;min-width:880px;">
            <thead><tr><th>User</th><th>Marché</th><th>Side</th><th>Outcome</th><th>Statut</th><th>Mise</th><th>Payout</th><th>Settled</th></tr></thead>
            <tbody>${settled.slice(0, 50).map(p => `<tr>
              <td class="muted" style="font-size:0.78rem;">${SF.escapeHtml(p.user_id.slice(0, 8))}…</td>
              <td><b>${SF.escapeHtml(p.market_question)}</b></td>
              <td>${p.side}</td>
              <td>${SF.escapeHtml(p.resolved_outcome || '—')}</td>
              <td><span class="risk-pill ${p.status === 'won' ? 'pos' : p.status === 'cancelled' ? 'warn' : 'neg'}">${p.status}</span></td>
              <td>${fmt2(p.stake)}</td>
              <td><b style="color:${Number(p.payout) > 0 ? '#16a34a' : '#dc2626'};">${fmt2(Number(p.payout))}</b></td>
              <td class="muted">${p.settled_at ? fmtDate(new Date(p.settled_at).getTime()) : '—'}</td>
            </tr>`).join("")}</tbody>
          </table></div>` : '<p class="muted" style="padding:30px;text-align:center;">Aucune position réglée encore.</p>'}
        </div>
      `;
    }

    const VIEWS = { dashboard: viewDashboard, analytics: viewAnalytics, risk: viewRisk, polymarket: viewPolymarket, users: viewUsers, evals: viewEvals, funded: viewFunded, payments: viewPayments, messages: viewMessages, communities: viewCommunities };

    function current() { const h = (location.hash || "#dashboard").slice(1); return VIEWS[h] ? h : "dashboard"; }
    function go(sec) { location.hash = sec; }
    window.go = go;
    function renderSidebar() {
      const cur = current();
      document.getElementById("boWho").innerHTML = `<div class="nm">Admin Console</div><div class="em">Spovibe</div><div style="margin-top:10px;"><span class="admin-pill">● Admin</span></div>`;
      document.getElementById("boNav").innerHTML = SECTIONS.map(item => {
        const [id, label, icon] = item;
        return `<button class="bo-link ${id === cur ? 'active' : ''}" onclick="go('${id}')">${icon}<span>${label}</span></button>`;
      }).join("");
    }
    function render() {
      const cur = current(), tt = TITLES[cur];
      const head = `<div class="dash-h"><div><h1>${tt[0]}</h1><div class="sub">${tt[1]}</div></div><div class="actions"><button class="pill-sel" onclick="refreshAdmin()">Actualiser</button><button class="pill-sel ghost" onclick="(async()=>{await SF.logout();location.href='index.html';})();">Se déconnecter</button></div></div>`;
      document.getElementById("view").innerHTML = head + VIEWS[cur]();
      renderSidebar();
      window.scrollTo({ top: 0, behavior: "instant" });
    }
    window.addEventListener("hashchange", render);

    // Re-fetch + re-render au clic sur "Actualiser"
    window.refreshAdmin = async () => {
      const ok = await loadAdminData();
      if (ok) render();
    };

    // Boot async : on attend que l'utilisateur Supabase soit hydraté ET
    // que les données admin soient chargées, sinon les vues seraient vides.
    (async () => {
      const view = document.getElementById("view");
      view.innerHTML = '<div style="padding:60px 20px;text-align:center;color:var(--muted);"><div style="width:42px;height:42px;border:3px solid var(--orange);border-top-color:transparent;border-radius:50%;margin:0 auto 18px;animation:sf-spin 0.8s linear infinite;"></div><div>Chargement de la console admin…</div></div><style>@keyframes sf-spin{to{transform:rotate(360deg)}}</style>';
      renderSidebar();
      if (window.SpovibeAuth) {
        await new Promise(r => setTimeout(r, 200));  // laisse l'auth Supabase s'initialiser
        if (!SF.currentUser()) {
          view.innerHTML = '<div class="card center" style="padding:60px;"><h3>Pas connecté</h3><p class="muted" style="margin-top:10px;">Connexion requise avec un compte admin Supabase via <a href="login.html">/login</a>.</p></div>';
          return;
        }
        const ok = await loadAdminData();
        if (!ok) return;  // loadAdminData a déjà affiché l'erreur
      }
      render();
    })();
  </script>
</body>
</html>
